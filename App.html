<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0d0d0d;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            touch-action: manipulation;
            position: relative;
            overflow: hidden;
        }
        .hamburger {
            position: absolute; top: 16px; left: 16px;
            display: flex; flex-direction: column; gap: 4px;
            cursor: pointer; padding: 6px;
            background: transparent; border: none; z-index: 10;
            touch-action: manipulation;
        }
        .hamburger span { display: block; width: 24px; height: 3px; background: #fff; border-radius: 2px; transition: 0.2s; }
        .circle-btn {
            width: 130px; height: 130px;
            border-radius: 50%;
            background: #ff0000;
            border: none; color: #fff; font-size: 0;
            cursor: pointer;
            box-shadow: 0 0 25px rgba(255,0,0,0.3);
            transition: transform 0.1s ease, box-shadow 0.2s ease, background 0.3s ease;
            touch-action: manipulation; user-select: none;
            -webkit-tap-highlight-color: transparent;
            z-index: 5; flex-shrink: 0;
        }
        .circle-btn.active { background: #00cc00; box-shadow: 0 0 35px rgba(0,204,0,0.4); }
        .circle-btn:active { transform: scale(0.92); }
        @media (max-width:480px) { .circle-btn { width: 110px; height: 110px; } }
        @media (max-width:360px) { .circle-btn { width: 90px; height: 90px; } }

        .menu-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 20;
            display: none; justify-content: flex-start; align-items: stretch; padding: 0;
        }
        .menu-overlay.open { display: flex; }
        .menu-panel {
            background: #1a1a1a; width: 100%; height: 100%;
            padding: 20px 16px; display: flex; flex-direction: column; overflow-y: auto;
        }
        .menu-panel .close-btn {
            color: #888; font-size: 1.8rem; text-align: right; padding: 4px 8px;
            border-bottom: 1px solid #2a2a2a; margin-bottom: 10px; cursor: pointer; flex-shrink: 0;
        }
        .menu-panel .close-btn:hover { color: #fff; }
        .menu-panel button {
            background: transparent; border: none; color: #ccc; padding: 16px 16px;
            text-align: left; font-size: 1.2rem; width: 100%; cursor: pointer;
            border-bottom: 1px solid #2a2a2a; transition: 0.15s; touch-action: manipulation;
        }
        .menu-panel button:last-child { border-bottom: none; }
        .menu-panel button:hover { background: #2a2a2a; color: #fff; }

        .config-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 30;
            display: none; justify-content: center; align-items: flex-start;
            padding: 12px; overflow-y: auto;
        }
        .config-modal.open { display: flex; }
        .config-box {
            background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px;
            padding: 16px 14px; max-width: 480px; width: 100%; margin: 10px auto;
            color: #ddd; box-shadow: 0 8px 40px rgba(0,0,0,0.9);
        }
        .config-box .header {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #2a2a2a; padding-bottom: 8px; margin-bottom: 12px;
        }
        .config-box .header h3 { color: #aaa; font-weight: 400; font-size: 1.1rem; margin: 0; }
        .config-box .header .back-btn {
            background: none; border: none; color: #888; font-size: 1.8rem;
            cursor: pointer; padding: 0 8px; touch-action: manipulation; font-weight: bold;
            line-height: 1;
        }
        .config-box .header .back-btn:hover { color: #fff; }
        .config-box label { color: #888; font-size: 0.75rem; display: block; margin: 10px 0 3px 0; letter-spacing: 0.3px; }
        .config-box .value-display {
            background: #0d0d0d; border: 1px solid #2a2a2a; border-radius: 4px;
            padding: 6px 10px; color: #eee; font-size: 0.95rem; margin-bottom: 3px;
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 4px;
        }
        .config-box .value-display .action-btn {
            background: #1a3a1a; border: 1px solid #2a5a2a; color: #8bc34a;
            padding: 3px 10px; border-radius: 4px; cursor: pointer; touch-action: manipulation; font-size: 0.75rem;
        }
        .config-box .value-display .action-btn:hover { background: #1f4a1f; }
        .config-box .value-display .action-btn.secondary { background: #2a2a2a; border-color: #3a3a3a; color: #ccc; }
        .config-box .value-display .action-btn.secondary:hover { background: #3a3a3a; }
        .config-box .value-display .action-btn.danger { background: #3a1a1a; border-color: #5a2a2a; color: #ff8a8a; }
        .config-box .value-display .action-btn.danger:hover { background: #4a1a1a; }
        .config-box .small-note { color: #666; font-size: 0.7rem; margin-top: 2px; }
        .config-box .checkbox-grid { display: flex; flex-wrap: wrap; gap: 3px 10px; margin: 3px 0 6px 0; }
        .config-box .checkbox-row { display: flex; align-items: center; gap: 6px; margin: 3px 0; }
        .config-box .checkbox-row input[type="checkbox"] { width: 16px; height: 16px; accent-color: #666; margin: 0; flex-shrink: 0; }
        .config-box .checkbox-row label { margin: 0; color: #aaa; font-size: 0.8rem; }
        .config-item {
            background: #0d0d0d; border: 1px solid #2a2a2a; padding: 6px 10px;
            border-radius: 4px; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center;
        }
        .config-item span { color: #eee; word-break: break-word; font-size: 0.85rem; }
        .config-item .del-btn { color: #f66; background: none; border: none; cursor: pointer; font-size: 1.1rem; padding: 0 4px; }
        .config-item .del-btn:hover { color: #f00; }
        .config-item .edit-btn { color: #88aaff; background: none; border: none; cursor: pointer; font-size: 0.95rem; padding: 0 4px; }
        .config-item .edit-btn:hover { color: #aaccff; }
        .config-item .item-actions { display: flex; gap: 3px; }
        .add-area { display: flex; gap: 5px; margin-top: 5px; flex-wrap: wrap; }
        .add-area button {
            padding: 5px 12px; background: #1a3a1a; color: #8bc34a;
            border: 1px solid #2a5a2a; border-radius: 4px; cursor: pointer;
            touch-action: manipulation; white-space: nowrap; font-size: 0.8rem;
        }
        .add-area button:hover { background: #1f4a1f; }
        .goal-tag {
            display: inline-block; background: #1a2a1a; color: #8bc34a;
            padding: 1px 6px; border-radius: 8px; font-size: 0.65rem; border: 1px solid #2a4a2a; margin-left: 4px;
        }
        .sub-section { border-top: 1px solid #2a2a2a; padding-top: 10px; margin-top: 10px; }
        .sub-section h4 { color: #999; font-weight: 400; margin-bottom: 5px; font-size: 0.9rem; }
        .training-entry {
            background: #0d0d0d; border-left: 2px solid #3a4a3a; padding: 3px 6px;
            margin-bottom: 3px; border-radius: 2px; display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem;
        }
        .training-entry .training-text { color: #bbb; }
        .training-entry .training-actions { display: flex; gap: 3px; }
        .training-entry .training-actions button { background: none; border: none; color: #888; cursor: pointer; font-size: 0.85rem; padding: 0 3px; }
        .training-entry .training-actions button:hover { color: #ddd; }
        .clothe-item {
            background: #0d0d0d; padding: 3px 6px; border-left: 2px solid #2a2a2a;
            margin-bottom: 3px; display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem;
        }
        .clothe-item span { color: #ccc; }
        .clothe-item .item-actions { display: flex; gap: 3px; }
        .clothe-item .item-actions button { background: none; border: none; color: #888; cursor: pointer; font-size: 0.85rem; padding: 0 3px; }
        .clothe-item .item-actions button:hover { color: #ddd; }
        .combo-item {
            background: #0d0d0d; padding: 3px 6px; border: 1px solid #1a1a1a;
            border-radius: 2px; margin: 2px 0; display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem;
        }
        .combo-item .combo-text { color: #ccc; }
        .combo-item .del-btn { color: #f66; background: none; border: none; cursor: pointer; font-size: 1rem; padding: 0 4px; }
        .combo-item .del-btn:hover { color: #f00; }
        .combo-selects { display: flex; gap: 3px; flex-wrap: wrap; align-items: center; margin: 3px 0; }
        .combo-selects select {
            background: #0a0a0a; border: 1px solid #2a2a2a; color: #ddd;
            padding: 3px 5px; border-radius: 2px; font-size: 0.75rem; min-width: 70px; flex: 1;
        }
        .history-list { max-height: 200px; overflow-y: auto; margin: 4px 0; }
        .history-list .history-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 3px 6px; border-bottom: 1px solid #1a1a1a; font-size: 0.8rem;
        }
        .history-list .history-item span { color: #bbb; }
        .history-list .history-item .history-actions { display: flex; gap: 3px; }
        .history-list .history-item .history-actions button { background: none; border: none; color: #888; cursor: pointer; font-size: 0.75rem; padding: 0 3px; }
        .history-list .history-item .history-actions button:hover { color: #ddd; }
        .evolution-area {
            background: #1a2a0a; border: 1px solid #2a4a2a; border-radius: 4px; padding: 6px 8px; margin-top: 5px;
        }
        .evolution-area .evo-title { color: #8bc34a; font-size: 0.75rem; font-weight: bold; margin-bottom: 3px; }
        .evolution-area .evo-row { display: flex; gap: 3px; flex-wrap: wrap; align-items: center; margin-top: 3px; }
        .evolution-area .evo-row input { flex: 1; min-width: 50px; background: #0a0a0a; border: 1px solid #2a2a2a; color: #ddd; padding: 4px; border-radius: 4px; font-size: 0.8rem; }
        .evolution-area .evo-row button { padding: 3px 10px; background: #1a3a1a; color: #8bc34a; border: 1px solid #2a5a2a; border-radius: 4px; cursor: pointer; touch-action: manipulation; font-size: 0.75rem; }
        .evolution-area .evo-row button:hover { background: #1f4a1f; }
        .evolution-history { color: #888; font-size: 0.65rem; margin-top: 3px; }
        .day-select { background: #0a0a0a; border: 1px solid #2a2a2a; color: #ddd; padding: 3px 6px; border-radius: 2px; min-width: 80px; font-size: 0.8rem; }
        .form-row { display: flex; gap: 6px; flex-wrap: wrap; }
        .form-row .form-group { flex: 1; min-width: 60px; }
        .form-group label { color: #888; font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.3px; margin: 0 0 2px 0; }
        .form-group input { background: #0a0a0a; border: 1px solid #2a2a2a; color: #ddd; padding: 4px 6px; border-radius: 4px; width: 100%; font-size: 0.85rem; }
        .form-group input:focus { outline: 1px solid #555; }
        .btn-row { display: flex; gap: 6px; margin-top: 10px; justify-content: flex-end; flex-wrap: wrap; }
        .btn-row button { padding: 6px 14px; border-radius: 6px; border: none; cursor: pointer; font-size: 0.85rem; touch-action: manipulation; }
        .btn-primary { background: #1a3a1a; color: #8bc34a; border: 1px solid #2a5a2a; }
        .btn-primary:hover { background: #1f4a1f; }
        .btn-secondary { background: #2a2a2a; color: #ccc; border: 1px solid #3a3a3a; }
        .btn-secondary:hover { background: #3a3a3a; }
        .btn-danger { background: #3a1a1a; color: #ff8a8a; border: 1px solid #5a2a2a; }
        .btn-danger:hover { background: #4a1a1a; }

        .sub-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 40;
            display: none; justify-content: center; align-items: center; padding: 16px;
        }
        .sub-modal.open { display: flex; }
        .sub-modal .config-box { max-width: 420px; margin: 0; }

        .today-training-card {
            background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 14px;
            padding: 16px 14px; margin: 6px 10px; width: calc(100% - 20px); max-width: 430px;
            display: none; z-index: 5; max-height: 62vh; overflow-y: auto;
        }
        .today-training-card.active { display: block; }
        .today-training-card .card-title {
            color: #aaa; font-size: 0.85rem; text-align: center; margin-bottom: 8px;
            border-bottom: 1px solid #2a2a2a; padding-bottom: 6px; font-weight: bold;
        }
        .today-training-card .exercise-card {
            background: #0d0d0d; border-radius: 10px; padding: 14px 16px;
            margin-bottom: 8px; border: 2px solid #2a2a2a; text-align: center;
        }
        .today-training-card .exercise-card .ex-name { color: #eee; font-size: 1.2rem; font-weight: bold; margin-bottom: 4px; }
        .today-training-card .exercise-card .ex-details { color: #aaa; font-size: 0.9rem; margin: 2px 0; }
        .today-training-card .exercise-card .ex-load { color: #8bc34a; font-size: 0.95rem; margin: 2px 0; }
        .today-training-card .exercise-card .ex-status { color: #666; font-size: 0.8rem; margin-top: 3px; }
        .today-training-card .exercise-card .ex-status.done { color: #8bc34a; }
        .today-training-card .exercise-card .ex-actions { display: flex; gap: 6px; margin-top: 8px; justify-content: center; flex-wrap: wrap; }
        .today-training-card .exercise-card .ex-actions button {
            padding: 6px 18px; border-radius: 6px; border: none; cursor: pointer; font-size: 0.85rem; touch-action: manipulation;
        }
        .today-training-card .exercise-card .ex-actions .btn-done { background: #1a3a1a; color: #8bc34a; border: 1px solid #2a5a2a; }
        .today-training-card .exercise-card .ex-actions .btn-done:hover { background: #1f4a1f; }
        .today-training-card .exercise-card .ex-actions .btn-done:disabled { opacity: 0.4; cursor: default; }
        .today-training-card .progress-bar { background: #0d0d0d; border-radius: 8px; height: 5px; margin: 6px 0; overflow: hidden; }
        .today-training-card .progress-bar .progress-fill { height: 100%; background: #8bc34a; width: 0%; transition: width 0.3s; }
        .today-training-card .progress-text { color: #888; font-size: 0.7rem; text-align: center; }
        .today-training-card .timer-display { background: #0d0d0d; border-radius: 8px; padding: 8px; text-align: center; margin: 6px 0; border: 1px solid #2a4a2a; }
        .today-training-card .timer-display .timer-text { color: #8bc34a; font-size: 1.4rem; font-weight: bold; font-variant-numeric: tabular-nums; }
        .today-training-card .timer-display .timer-label { color: #888; font-size: 0.7rem; }

        .peso-aviso {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 50;
            display: none; justify-content: center; align-items: center; padding: 16px;
        }
        .peso-aviso.open { display: flex; }
        .peso-aviso .aviso-box {
            background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px;
            padding: 20px; max-width: 340px; width: 100%; text-align: center;
        }
        .peso-aviso .aviso-box h3 { color: #ff8a8a; font-weight: 400; margin-bottom: 10px; font-size: 1.1rem; }
        .peso-aviso .aviso-box p { color: #ccc; margin-bottom: 10px; font-size: 0.9rem; }
        .peso-aviso .aviso-box input { background: #0a0a0a; border: 1px solid #2a2a2a; color: #ddd; padding: 6px; border-radius: 4px; width: 100%; margin: 6px 0; font-size: 1rem; }
        .peso-aviso .aviso-box .btn-row { justify-content: center; }

        .confirm-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 60;
            display: none; justify-content: center; align-items: center; padding: 20px;
        }
        .confirm-modal.open { display: flex; }
        .confirm-modal .confirm-box {
            background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px;
            padding: 20px; max-width: 340px; width: 100%; text-align: center;
        }
        .confirm-modal .confirm-box h3 { color: #eee; font-weight: 400; margin-bottom: 10px; }
        .confirm-modal .confirm-box p { color: #aaa; margin-bottom: 14px; font-size: 0.9rem; }
        .confirm-modal .confirm-box .btn-row { justify-content: center; }

        .evolucao-verde { color: #8bc34a; }
        .evolucao-vermelha { color: #ff6b6b; }
        .evolucao-neutra { color: #aaa; }
        .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }
        .status-dot.verde { background: #8bc34a; }
        .status-dot.vermelha { background: #ff6b6b; }
        .status-dot.neutra { background: #666; }

        .graph-container { background: #0d0d0d; border: 1px solid #2a2a2a; border-radius: 6px; padding: 10px; margin: 6px 0; overflow-x: auto; }
        .graph-container .graph-bar { display: flex; align-items: flex-end; height: 60px; gap: 4px; min-width: 200px; }
        .graph-container .graph-bar .bar-item { flex: 1; display: flex; flex-direction: column; align-items: center; min-width: 20px; }
        .graph-container .graph-bar .bar-item .bar { width: 100%; border-radius: 2px 2px 0 0; min-height: 2px; transition: height 0.3s; background: #8bc34a; }
        .graph-container .graph-bar .bar-item .bar-label { color: #666; font-size: 0.55rem; margin-top: 2px; text-align: center; }
        .graph-container .graph-bar .bar-item .bar-value { color: #aaa; font-size: 0.6rem; margin-bottom: 2px; }
        .graph-container .graph-title { color: #888; font-size: 0.7rem; margin-bottom: 4px; text-align: center; }

        .evo-table {
            width: 100%; border-collapse: collapse; margin: 6px 0; font-size: 0.8rem;
        }
        .evo-table th { color: #888; text-align: left; padding: 4px 6px; border-bottom: 1px solid #2a2a2a; }
        .evo-table td { padding: 4px 6px; border-bottom: 1px solid #1a1a1a; color: #ccc; }
        .evo-table .clickable { cursor: pointer; transition: 0.15s; }
        .evo-table .clickable:hover { background: #1a1a1a; }
        .full-btn { width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #2a5a2a; background: #1a3a1a; color: #8bc34a; cursor: pointer; touch-action: manipulation; font-size: 0.9rem; margin-top: 6px; }
        .full-btn:hover { background: #1f4a1f; }
        .view-mode .config-item .del-btn, .view-mode .config-item .edit-btn,
        .view-mode .add-area, .view-mode .training-entry .training-actions,
        .view-mode .clothe-item .item-actions, .view-mode .combo-item .del-btn,
        .view-mode .history-item .history-actions, .view-mode .value-display .action-btn,
        .view-mode .checkbox-row input[type="checkbox"], .view-mode #addObjetivoBtn,
        .view-mode #addTreinoBtn, .view-mode [data-action="add-exercicio"],
        .view-mode [data-action="add-roupa"], .view-mode [data-action="add-combo"],
        .view-mode #editInicioBtn, .view-mode #addPesoBtn,
        .view-mode #showPesoHistoryBtn, .view-mode #editIntervaloBtn {
            display: none !important;
        }
        .view-mode .config-item span { font-size: 0.9rem; }
        .view-mode .value-display span { font-size: 1rem; }
        .view-mode .config-box { max-width: 100%; }
        .view-mode .evo-table td { font-size: 0.9rem; }
        .view-mode .evo-table .clickable:hover { background: transparent; }

        .drag-handle { cursor: grab; color: #555; padding: 0 4px; font-size: 1rem; user-select: none; }
        .drag-handle:active { cursor: grabbing; }
        .dragging { opacity: 0.5; }
        .drag-over { border-color: #8bc34a !important; background: #1a2a1a; }
        .exercicio-lista { margin: 4px 0; }
        .exercicio-lista .ex-item {
            background: #0d0d0d; border: 1px solid #2a2a2a; border-radius: 4px;
            padding: 6px 10px; margin-bottom: 4px; display: flex; align-items: center; gap: 8px;
        }
        .exercicio-lista .ex-item .ex-info { flex: 1; color: #ccc; font-size: 0.85rem; }
        .exercicio-lista .ex-item .ex-actions { display: flex; gap: 3px; }
        .exercicio-lista .ex-item .ex-actions button { background: none; border: none; color: #888; cursor: pointer; font-size: 0.85rem; padding: 0 3px; }
        .exercicio-lista .ex-item .ex-actions button:hover { color: #ddd; }
    </style>
</head>
<body>
    <button class="hamburger" id="hamburgerBtn"><span></span><span></span><span></span></button>
    <button class="circle-btn" id="mainBtn"></button>

    <div class="today-training-card" id="todayCard">
        <div class="card-title" id="cardTitle">Treino de Hoje</div>
        <div id="exercisesContainer"></div>
        <div id="timerContainer"></div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <div class="progress-text" id="progressText">0/0 concluídos</div>
    </div>

    <div class="menu-overlay" id="menuOverlay">
        <div class="menu-panel">
            <div class="close-btn" id="closeMenuBtn">✕</div>
            <button id="menuAcademiaBtn">Academia</button>
            <button id="menuConfigBtn">Configurações</button>
        </div>
    </div>

    <div class="config-modal" id="configModal">
        <div class="config-box" id="configBox">
            <div class="header">
                <button class="back-btn" id="backFromConfig">←</button>
                <h3 id="configTitle">Academia</h3>
                <div style="width:30px;"></div>
            </div>
            <div id="configContent"></div>
        </div>
    </div>

    <div class="sub-modal" id="subModal"><div class="config-box" id="subModalBox"></div></div>

    <div class="peso-aviso" id="pesoAviso">
        <div class="aviso-box">
            <h3>Hora de Pesar!</h3>
            <p id="pesoAvisoText">Registre seu novo peso.</p>
            <input type="number" step="0.1" id="pesoAvisoInput" placeholder="Peso atual (kg)" />
            <div class="btn-row"><button class="btn-primary" id="pesoAvisoBtn">Registrar</button></div>
        </div>
    </div>

    <div class="confirm-modal" id="confirmModal">
        <div class="confirm-box">
            <h3 id="confirmTitle">Confirmar</h3>
            <p id="confirmMsg">Tem certeza?</p>
            <div class="btn-row">
                <button class="btn-secondary" id="confirmNo">Não</button>
                <button class="btn-danger" id="confirmYes">Sim</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const DB_NAME = 'AcademiaDB';
            const STORE_NAME = 'academiaStore';

            let db = null;
            let configData = {
                academia: {
                    inicio: '2026-06-30',
                    peso: { atual: null, historico: [], meta: null, intervalo: 7, ultimoRegistro: null },
                    diasDescanso: [],
                    objetivos: [],
                    roupas: { camisas: [], calcas: [], tenis: [] },
                    combinacoes: {},
                    treinos: [],
                    treinoConcluido: {}
                }
            };

            let treinoAtual = null;
            let timerInterval = null;
            let timerRestante = 0;
            let aguardandoTimer = false;
            let exercicioAtualIndex = 0;
            let pendingConfirm = null;

            const DIAS_SEMANA = ['Segunda', 'Terça', 'Quarta', 'Quinta', 'Sexta', 'Sábado', 'Domingo'];

            function openDB() {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(DB_NAME, 10);
                    request.onupgradeneeded = (e) => {
                        const db = e.target.result;
                        if (!db.objectStoreNames.contains(STORE_NAME)) {
                            db.createObjectStore(STORE_NAME, { keyPath: 'id' });
                        }
                    };
                    request.onsuccess = (e) => resolve(e.target.result);
                    request.onerror = (e) => reject(e.target.error);
                });
            }

            function getStore(mode) {
                const tx = db.transaction(STORE_NAME, mode);
                return tx.objectStore(STORE_NAME);
            }

            function loadConfig() {
                return new Promise((resolve) => {
                    const store = getStore('readonly');
                    const req = store.get('main');
                    req.onsuccess = () => {
                        if (req.result && req.result.data) {
                            configData = req.result.data;
                            if (!configData.academia.peso) {
                                configData.academia.peso = { atual: null, historico: [], meta: null, intervalo: 7, ultimoRegistro: null };
                            }
                            if (!configData.academia.peso.intervalo) configData.academia.peso.intervalo = 7;
                            if (!configData.academia.roupas) {
                                configData.academia.roupas = { camisas: [], calcas: [], tenis: [] };
                            }
                            if (!configData.academia.combinacoes) {
                                configData.academia.combinacoes = {};
                            }
                            if (!configData.academia.treinos) {
                                configData.academia.treinos = [];
                            }
                            if (!configData.academia.objetivos) {
                                configData.academia.objetivos = [];
                            }
                            if (!configData.academia.diasDescanso) {
                                configData.academia.diasDescanso = [];
                            }
                            if (!configData.academia.treinoConcluido) {
                                configData.academia.treinoConcluido = {};
                            }
                        } else {
                            configData = {
                                academia: {
                                    inicio: '2026-06-30',
                                    peso: { atual: null, historico: [], meta: null, intervalo: 7, ultimoRegistro: null },
                                    diasDescanso: [],
                                    objetivos: [],
                                    roupas: { camisas: [], calcas: [], tenis: [] },
                                    combinacoes: {},
                                    treinos: [],
                                    treinoConcluido: {}
                                }
                            };
                        }
                        resolve();
                    };
                    req.onerror = () => {
                        configData = {
                            academia: {
                                inicio: '2026-06-30',
                                peso: { atual: null, historico: [], meta: null, intervalo: 7, ultimoRegistro: null },
                                diasDescanso: [],
                                objetivos: [],
                                roupas: { camisas: [], calcas: [], tenis: [] },
                                combinacoes: {},
                                treinos: [],
                                treinoConcluido: {}
                            }
                        };
                        resolve();
                    };
                });
            }

            function saveConfig() {
                return new Promise((resolve) => {
                    const store = getStore('readwrite');
                    const req = store.put({ id: 'main', data: configData });
                    req.onsuccess = () => resolve();
                    req.onerror = () => resolve();
                });
            }

            const btn = document.getElementById('mainBtn');
            let isActive = false;
            let botaoVerde = false;

            function getTodayName() {
                const names = ['Domingo', 'Segunda', 'Terça', 'Quarta', 'Quinta', 'Sexta', 'Sábado'];
                return names[new Date().getDay()];
            }

            function getTodayKey() {
                const d = new Date();
                return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
            }

            function getTodayTreinos() {
                const hoje = getTodayName();
                const treinos = configData.academia.treinos || [];
                return treinos.filter(t => t.dia === hoje);
            }

            function verificarPeso() {
                const peso = configData.academia.peso;
                if (!peso.ultimoRegistro) return false;
                const ultimo = new Date(peso.ultimoRegistro);
                const hoje = new Date();
                const diff = Math.floor((hoje - ultimo) / (1000 * 60 * 60 * 24));
                return diff >= (peso.intervalo || 7);
            }

            function getDiasDesdePesagem() {
                const peso = configData.academia.peso;
                if (!peso.ultimoRegistro) return 999;
                const ultimo = new Date(peso.ultimoRegistro);
                const hoje = new Date();
                return Math.floor((hoje - ultimo) / (1000 * 60 * 60 * 24));
            }

            function getUltimaPesagemData() {
                const peso = configData.academia.peso;
                if (!peso.ultimoRegistro) return 'Nunca';
                const d = new Date(peso.ultimoRegistro);
                return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
            }

            function getDiasFrequentados() {
                const inicio = configData.academia.inicio;
                if (!inicio) return 0;
                const parts = inicio.split('-');
                const d = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
                const hoje = new Date();
                const diff = Math.floor((hoje - d) / (1000 * 60 * 60 * 24));
                return diff > 0 ? diff : 0;
            }

            function formatDataBR(dataStr) {
                if (!dataStr) return '';
                const parts = dataStr.split('-');
                if (parts.length === 3) {
                    return `${parts[2]}/${parts[1]}/${parts[0]}`;
                }
                return dataStr;
            }

            function mostrarConfirmacao(titulo, msg, callback) {
                const modal = document.getElementById('confirmModal');
                document.getElementById('confirmTitle').textContent = titulo;
                document.getElementById('confirmMsg').textContent = msg;
                modal.classList.add('open');
                pendingConfirm = callback;
            }

            document.getElementById('confirmYes').addEventListener('click', function() {
                document.getElementById('confirmModal').classList.remove('open');
                if (pendingConfirm) {
                    pendingConfirm(true);
                    pendingConfirm = null;
                }
            });

            document.getElementById('confirmNo').addEventListener('click', function() {
                document.getElementById('confirmModal').classList.remove('open');
                if (pendingConfirm) {
                    pendingConfirm(false);
                    pendingConfirm = null;
                }
            });

            function mostrarAvisoPeso() {
                const aviso = document.getElementById('pesoAviso');
                const p = document.getElementById('pesoAvisoText');
                const diff = getDiasDesdePesagem();
                p.textContent = `Já faz ${diff} dias desde a última pesagem (${getUltimaPesagemData()}). Registre seu novo peso.`;
                aviso.classList.add('open');
                document.getElementById('pesoAvisoInput').focus();
            }

            document.getElementById('pesoAvisoBtn').addEventListener('click', function() {
                const input = document.getElementById('pesoAvisoInput');
                const val = parseFloat(input.value);
                if (isNaN(val) || val <= 0) { alert('Peso inválido.'); return; }
                const hoje = new Date().toISOString().split('T')[0].split('-').reverse().join('/');
                configData.academia.peso.historico.push({ peso: val, data: hoje });
                configData.academia.peso.atual = val;
                configData.academia.peso.ultimoRegistro = new Date().toISOString();
                saveConfig().then(() => {
                    document.getElementById('pesoAviso').classList.remove('open');
                    document.getElementById('pesoAvisoInput').value = '';
                    if (treinoAtual) renderTreinoCard();
                });
            });

            function limparTimer() {
                if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
                timerRestante = 0;
                aguardandoTimer = false;
                document.getElementById('timerContainer').innerHTML = '';
            }

            function iniciarTimer(segundos, callback) {
                limparTimer();
                timerRestante = segundos;
                aguardandoTimer = true;
                const container = document.getElementById('timerContainer');
                const mins = Math.floor(segundos/60);
                const secs = segundos%60;
                container.innerHTML = `<div class="timer-display">
                    <div class="timer-label">Descanso</div>
                    <div class="timer-text" id="timerText">${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}</div>
                </div>`;

                timerInterval = setInterval(() => {
                    timerRestante--;
                    if (timerRestante <= 0) {
                        limparTimer();
                        container.innerHTML = '';
                        aguardandoTimer = false;
                        if (callback) callback();
                    } else {
                        const m = Math.floor(timerRestante/60);
                        const s = timerRestante%60;
                        document.getElementById('timerText').textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
                    }
                }, 1000);
            }

            function renderTreinoCard() {
                const container = document.getElementById('exercisesContainer');
                const exercicios = treinoAtual.exercicios || [];
                if (exercicios.length === 0) {
                    container.innerHTML = '<div style="color:#666;text-align:center;padding:20px;">Nenhum exercício definido.</div>';
                    return;
                }
                let html = '';
                const ex = exercicios[exercicioAtualIndex];
                if (!ex) {
                    container.innerHTML = '<div style="color:#666;text-align:center;padding:20px;">Treino concluído!</div>';
                    return;
                }
                const totalSeries = ex.sets || 1;
                const seriesFeitas = ex._seriesFeitas || 0;
                const isDone = seriesFeitas >= totalSeries;
                const statusClass = isDone ? 'done' : '';
                const statusText = isDone ? 'Concluído' : `${seriesFeitas}/${totalSeries} séries`;
                const warmupText = ex.warmup ? 'Aquecimento' : '';
                const proximaSerie = seriesFeitas + 1;
                html += `<div class="exercise-card">
                    <div class="ex-name">${ex.exercise || 'Exercício'} ${warmupText}</div>
                    <div class="ex-details">${ex.sets || '?'} séries x ${ex.reps || '?'} reps</div>
                    <div class="ex-load">${ex.load !== null && ex.load !== undefined ? `Carga: ${ex.load}kg` : 'Sem carga definida'}</div>
                    ${ex.metaCarga ? `<div class="ex-load" style="color:#ffaa00;">Meta: ${ex.metaCarga}kg</div>` : ''}
                    <div class="ex-status ${statusClass}">${statusText}</div>
                    ${!isDone && !aguardandoTimer ? `<div class="ex-actions">
                        <button class="btn-done" data-idx="${exercicioAtualIndex}">PRONTO ${proximaSerie}/${totalSeries}</button>
                    </div>` : ''}
                    ${isDone ? '<div class="ex-actions"><span style="color:#8bc34a;font-size:0.85rem;">Concluído</span></div>' : ''}
                    ${aguardandoTimer ? '<div class="ex-actions"><span style="color:#ffaa00;font-size:0.85rem;">Aguardando descanso...</span></div>' : ''}
                </div>`;
                container.innerHTML = html;

                const total = exercicios.length;
                const done = exercicios.filter(e => (e._seriesFeitas || 0) >= (e.sets || 1)).length;
                const pct = total > 0 ? (done / total) * 100 : 0;
                document.getElementById('progressFill').style.width = pct + '%';
                document.getElementById('progressText').textContent = `${done}/${total} exercícios concluídos`;

                document.querySelectorAll('.btn-done').forEach(b => {
                    b.addEventListener('click', function() {
                        const idx = parseInt(this.dataset.idx);
                        if (aguardandoTimer) return;
                        const ex = treinoAtual.exercicios[idx];
                        const totalSeries = ex.sets || 1;
                        const seriesFeitas = ex._seriesFeitas || 0;
                        if (seriesFeitas >= totalSeries) return;

                        ex._seriesFeitas = (ex._seriesFeitas || 0) + 1;

                        if (ex._seriesFeitas >= totalSeries) {
                            ex._done = true;
                            if (!ex.warmup) {
                                const overlay = document.createElement('div');
                                overlay.className = 'sub-modal';
                                overlay.style.display = 'flex';
                                overlay.innerHTML = `<div class="config-box">
                                    <h3>Evolução de Carga</h3>
                                    <p style="color:#aaa;font-size:0.85rem;margin-bottom:6px;">Registre a evolução para ${ex.exercise}</p>
                                    <label>Carga atual (kg)</label>
                                    <input type="number" step="0.5" id="evoLoadDone" value="${ex.load || ''}" style="background:#0a0a0a;border:1px solid #2a2a2a;color:#ddd;padding:6px;border-radius:4px;width:100%;margin:3px 0;" />
                                    <label>Repetições atuais</label>
                                    <input type="number" id="evoRepsDone" value="${ex.reps || ''}" style="background:#0a0a0a;border:1px solid #2a2a2a;color:#ddd;padding:6px;border-radius:4px;width:100%;margin:3px 0;" />
                                    <div style="margin:3px 0;"><span style="color:#666;font-size:0.7rem;">Deixe em branco se não houve evolução</span></div>
                                    <div class="btn-row">
                                        <button class="btn-secondary" id="cancelEvoDone">Pular</button>
                                        <button class="btn-primary" id="saveEvoDone">Registrar</button>
                                    </div>
                                </div>`;
                                document.body.appendChild(overlay);

                                document.getElementById('cancelEvoDone').onclick = function() {
                                    overlay.remove();
                                    proximoExercicio(idx);
                                };

                                document.getElementById('saveEvoDone').onclick = function() {
                                    const load = parseFloat(document.getElementById('evoLoadDone').value);
                                    const reps = parseInt(document.getElementById('evoRepsDone').value);
                                    const hoje = new Date().toISOString().split('T')[0].split('-').reverse().join('/');
                                    if (!ex.loadHistory) ex.loadHistory = [];
                                    if (!isNaN(load) && load > 0) {
                                        ex.loadHistory.push({ load, reps: reps || ex.reps, date: hoje });
                                        ex.load = load;
                                    }
                                    if (!isNaN(reps) && reps > 0) {
                                        ex.reps = reps;
                                    }
                                    overlay.remove();
                                    saveConfig().then(() => { proximoExercicio(idx); });
                                };
                                overlay.addEventListener('click', function(e) { if (e.target === this) this.remove(); });
                                return;
                            } else {
                                saveConfig().then(() => { proximoExercicio(idx); });
                                return;
                            }
                        } else {
                            saveConfig().then(() => {
                                const hojeKey = getTodayKey();
                                configData.academia[`treino_${hojeKey}`] = treinoAtual;
                                saveConfig().then(() => renderTreinoCard());
                            });
                        }
                    });
                });
            }

            function proximoExercicio(idxAtual) {
                const exercicios = treinoAtual.exercicios || [];
                let proximoIdx = -1;
                for (let i = idxAtual + 1; i < exercicios.length; i++) {
                    const ex = exercicios[i];
                    if ((ex._seriesFeitas || 0) < (ex.sets || 1)) {
                        proximoIdx = i;
                        break;
                    }
                }

                if (proximoIdx === -1) {
                    exercicioAtualIndex = exercicios.length;
                    renderTreinoCard();
                    const hojeKey = getTodayKey();
                    configData.academia.treinoConcluido[hojeKey] = true;
                    configData.academia[`treino_${hojeKey}`] = null;
                    saveConfig().then(() => {
                        setTimeout(() => {
                            mostrarConfirmacao('Treino Concluído', 'Parabéns! Você concluiu o treino de hoje.', function(ok) {
                                btn.classList.remove('active');
                                isActive = false;
                                botaoVerde = false;
                                document.getElementById('todayCard').classList.remove('active');
                                treinoAtual = null;
                                limparTimer();
                            });
                        }, 500);
                    });
                    return;
                }

                exercicioAtualIndex = proximoIdx;
                const proxEx = exercicios[proximoIdx];
                const descanso = proxEx.descanso || 0;

                if (descanso > 0) {
                    aguardandoTimer = true;
                    renderTreinoCard();
                    iniciarTimer(descanso, () => {
                        aguardandoTimer = false;
                        renderTreinoCard();
                    });
                } else {
                    renderTreinoCard();
                }

                const hojeKey = getTodayKey();
                configData.academia[`treino_${hojeKey}`] = treinoAtual;
                saveConfig();
            }

            function iniciarTreino() {
                const treinos = getTodayTreinos();
                if (treinos.length === 0) {
                    mostrarConfirmacao('Aviso', 'Nenhum treino programado para hoje.', function(ok) {
                        btn.classList.remove('active');
                        isActive = false;
                        botaoVerde = false;
                        document.getElementById('todayCard').classList.remove('active');
                    });
                    return;
                }

                const hojeKey = getTodayKey();
                if (configData.academia.treinoConcluido && configData.academia.treinoConcluido[hojeKey]) {
                    mostrarConfirmacao('Treino Concluído', 'Você já concluiu o treino de hoje. Deseja refazê-lo?', function(ok) {
                        if (ok) {
                            configData.academia.treinoConcluido[hojeKey] = false;
                            saveConfig().then(() => iniciarTreinoAtual());
                        } else {
                            btn.classList.remove('active');
                            isActive = false;
                            botaoVerde = false;
                        }
                    });
                    return;
                }

                if (configData.academia[`treino_${hojeKey}`]) {
                    treinoAtual = configData.academia[`treino_${hojeKey}`];
                    exercicioAtualIndex = 0;
                    if (treinoAtual.exercicios) {
                        treinoAtual.exercicios.forEach(e => {
                            if (e._seriesFeitas === undefined) e._seriesFeitas = 0;
                            if (e._done === undefined) e._done = false;
                        });
                        for (let i = 0; i < treinoAtual.exercicios.length; i++) {
                            if ((treinoAtual.exercicios[i]._seriesFeitas || 0) < (treinoAtual.exercicios[i].sets || 1)) {
                                exercicioAtualIndex = i;
                                break;
                            }
                        }
                    }
                    document.getElementById('todayCard').classList.add('active');
                    btn.classList.add('active');
                    isActive = true;
                    botaoVerde = true;
                    renderTreinoCard();
                    if (verificarPeso()) mostrarAvisoPeso();
                    return;
                }

                iniciarTreinoAtual();
            }

            function iniciarTreinoAtual() {
                const treinos = getTodayTreinos();
                if (treinos.length === 0) return;
                treinoAtual = JSON.parse(JSON.stringify(treinos[0]));
                if (treinoAtual.exercicios) {
                    treinoAtual.exercicios.forEach(e => {
                        e._seriesFeitas = 0;
                        e._done = false;
                    });
                }
                exercicioAtualIndex = 0;
                document.getElementById('todayCard').classList.add('active');
                btn.classList.add('active');
                isActive = true;
                botaoVerde = true;
                renderTreinoCard();

                const hojeKey = getTodayKey();
                configData.academia[`treino_${hojeKey}`] = treinoAtual;
                saveConfig();

                if (verificarPeso()) mostrarAvisoPeso();
            }

            btn.addEventListener('click', function() {
                if (isActive) {
                    if (treinoAtual && treinoAtual.exercicios) {
                        const algumFeito = treinoAtual.exercicios.some(e => (e._seriesFeitas || 0) > 0);
                        if (algumFeito) {
                            mostrarConfirmacao('Parar Treino', 'Você já fez alguns exercícios. Deseja realmente parar?', function(ok) {
                                if (ok) {
                                    btn.classList.remove('active');
                                    isActive = false;
                                    botaoVerde = false;
                                    document.getElementById('todayCard').classList.remove('active');
                                    treinoAtual = null;
                                    limparTimer();
                                    const hojeKey = getTodayKey();
                                    configData.academia[`treino_${hojeKey}`] = null;
                                    saveConfig();
                                }
                            });
                            return;
                        }
                    }
                    btn.classList.remove('active');
                    isActive = false;
                    botaoVerde = false;
                    document.getElementById('todayCard').classList.remove('active');
                    treinoAtual = null;
                    limparTimer();
                } else {
                    const treinos = getTodayTreinos();
                    if (treinos.length === 0) {
                        mostrarConfirmacao('Aviso', 'Nenhum treino programado para hoje.', function(ok) {});
                        return;
                    }
                    iniciarTreino();
                }
            });

            const hamburger = document.getElementById('hamburgerBtn');
            const menuOverlay = document.getElementById('menuOverlay');
            const closeMenuBtn = document.getElementById('closeMenuBtn');
            const menuAcademiaBtn = document.getElementById('menuAcademiaBtn');
            const menuConfigBtn = document.getElementById('menuConfigBtn');
            const configModal = document.getElementById('configModal');
            const backFromConfig = document.getElementById('backFromConfig');
            const configContent = document.getElementById('configContent');
            const configTitle = document.getElementById('configTitle');
            const subModal = document.getElementById('subModal');
            const subModalBox = document.getElementById('subModalBox');

            let modoVisualizacao = false;

            function openMenu() {
                menuOverlay.classList.add('open');
            }

            function closeMenu() {
                menuOverlay.classList.remove('open');
            }

            hamburger.addEventListener('click', openMenu);
            closeMenuBtn.addEventListener('click', closeMenu);

            function openConfig(mode) {
                modoVisualizacao = (mode === 'view');
                configModal.classList.add('open');
                if (modoVisualizacao) {
                    configModal.classList.add('view-mode');
                } else {
                    configModal.classList.remove('view-mode');
                }
                renderConfig();
            }

            function closeConfig() {
                configModal.classList.remove('open');
                configModal.classList.remove('view-mode');
            }

            backFromConfig.addEventListener('click', function() {
                closeConfig();
                openMenu();
            });

            function openSubModal(html) {
                subModalBox.innerHTML = html;
                subModal.classList.add('open');
            }

            function closeSubModal() {
                subModal.classList.remove('open');
                subModalBox.innerHTML = '';
            }

            function calcularEvolucaoCarga(ex) {
                if (!ex.loadHistory || ex.loadHistory.length < 2) return { status: 'neutra', texto: 'Sem dados', pct: 0, diff: 0 };
                const primeiro = ex.loadHistory[0];
                const ultimo = ex.loadHistory[ex.loadHistory.length - 1];
                const diff = ultimo.load - primeiro.load;
                const pct = primeiro.load !== 0 ? (diff / primeiro.load) * 100 : 0;
                const meta = ex.metaCarga;
                let status = 'neutra';
                if (meta !== null && meta !== undefined) {
                    if (meta > primeiro.load && diff > 0) status = 'verde';
                    else if (meta < primeiro.load && diff < 0) status = 'verde';
                    else if (diff > 0) status = 'verde';
                    else if (diff < 0) status = 'vermelha';
                    else status = 'neutra';
                } else {
                    status = diff > 0 ? 'verde' : (diff < 0 ? 'vermelha' : 'neutra');
                }
                return { status, texto: `${diff > 0 ? '+' : ''}${diff.toFixed(1)}kg (${pct > 0 ? '+' : ''}${pct.toFixed(1)}%)`, pct, diff };
            }

            function gerarGrafico(history, label) {
                if (!history || history.length < 2) return '<div class="small-note">Dados insuficientes para gráfico</div>';
                const sorted = [...history].sort((a,b) => {
                    const da = a.data.split('/').reverse().join('-');
                    const db = b.data.split('/').reverse().join('-');
                    return da.localeCompare(db);
                });
                const maxVal = Math.max(...sorted.map(h => h.peso || h.load || 0));
                const minVal = Math.min(...sorted.map(h => h.peso || h.load || 0));
                const range = maxVal - minVal || 1;
                let html = `<div class="graph-container"><div class="graph-title">${label}</div><div class="graph-bar">`;
                sorted.forEach((h, i) => {
                    const val = h.peso || h.load || 0;
                    const height = ((val - minVal) / range) * 50 + 10;
                    const dataStr = h.data || '--';
                    html += `<div class="bar-item">
                        <div class="bar-value">${val.toFixed(1)}</div>
                        <div class="bar" style="height:${height}px;"></div>
                        <div class="bar-label">${dataStr}</div>
                    </div>`;
                });
                html += `</div></div>`;
                return html;
            }

            let draggedIndex = null;

            function renderExerciciosLista(treinoIdx, container) {
                const treino = configData.academia.treinos[treinoIdx];
                if (!treino || !treino.exercicios) return;
                let html = '<div class="exercicio-lista" id="exercicioLista">';
                treino.exercicios.forEach((ex, idx) => {
                    const detalhes = [];
                    if (ex.exercise) detalhes.push(ex.exercise);
                    if (ex.sets) detalhes.push(ex.sets + 'x' + ex.reps);
                    if (ex.load) detalhes.push(ex.load + 'kg');
                    html += `<div class="ex-item" draggable="true" data-idx="${idx}">
                        <span class="drag-handle">⠿</span>
                        <span class="ex-info">${detalhes.join(' • ')}</span>
                        <div class="ex-actions">
                            <button data-idx="${idx}" data-action="edit-exercicio-lista">✎</button>
                            <button data-idx="${idx}" data-action="delete-exercicio-lista">✕</button>
                        </div>
                    </div>`;
                });
                html += '</div>';
                container.innerHTML = html;

                const lista = document.getElementById('exercicioLista');
                if (!lista) return;

                lista.querySelectorAll('.ex-item').forEach(item => {
                    item.addEventListener('dragstart', function(e) {
                        draggedIndex = parseInt(this.dataset.idx);
                        this.classList.add('dragging');
                        e.dataTransfer.effectAllowed = 'move';
                    });
                    item.addEventListener('dragend', function() {
                        this.classList.remove('dragging');
                    });
                    item.addEventListener('dragover', function(e) {
                        e.preventDefault();
                        this.classList.add('drag-over');
                    });
                    item.addEventListener('dragleave', function() {
                        this.classList.remove('drag-over');
                    });
                    item.addEventListener('drop', function(e) {
                        e.preventDefault();
                        this.classList.remove('drag-over');
                        const targetIdx = parseInt(this.dataset.idx);
                        if (draggedIndex !== null && draggedIndex !== targetIdx) {
                            const exercicios = configData.academia.treinos[treinoIdx].exercicios;
                            const [moved] = exercicios.splice(draggedIndex, 1);
                            exercicios.splice(targetIdx, 0, moved);
                            saveConfig().then(() => {
                                renderExerciciosLista(treinoIdx, container);
                                renderConfig();
                            });
                        }
                        draggedIndex = null;
                    });
                });

                lista.querySelectorAll('[data-action="edit-exercicio-lista"]').forEach(b => {
                    b.addEventListener('click', function() {
                        const idx = parseInt(this.dataset.idx);
                        const treino = configData.academia.treinos[treinoIdx];
                        if (!treino || !treino.exercicios || !treino.exercicios[idx]) return;
                        const ex = treino.exercicios[idx];
                        const descMins = ex.descanso ? Math.floor(ex.descanso/60) : 0;
                        const descSecs = ex.descanso ? ex.descanso%60 : 0;
                        let evoHtml = '';
                        if (!ex.warmup) {
                            const hist = (ex.loadHistory || []).map(h => h.load + 'kg x' + (h.reps || '?') + ' (' + (h.date || '--') + ')').join(' → ') || 'Nenhum';
                            evoHtml = `
                            <div class="evolution-area">
                                <div class="evo-title">Progressão de Carga</div>
                                <div class="evo-row">
                                    <input type="number" step="0.5" id="evoLoad" placeholder="Nova carga" style="flex:1;min-width:50px;" />
                                    <input type="number" id="evoReps" placeholder="Novas reps" style="flex:1;min-width:50px;" />
                                    <button id="addEvoBtn">Registrar</button>
                                </div>
                                <div class="evolution-history">Histórico: ${hist}</div>
                                <div style="margin-top:4px;"><button class="btn-secondary" id="editLoadHistoryBtn" style="padding:2px 8px;font-size:0.7rem;">Editar Histórico</button></div>
                            </div>`;
                        }
                        openSubModal(`
                            <h3>Editar Exercício</h3>
                            <label>Exercício *</label>
                            <input type="text" id="exEditNome" value="${ex.exercise || ''}" style="background:#0a0a0a;border:1px solid #2a2a2a;color:#ddd;padding:6px;border-radius:4px;width:100%;margin:3px 0;" />
                            <div class="form-row">
                                <div class="form-group"><label>Séries *</label><input type="number" id="exEditSets" value="${ex.sets || ''}" /></div>
                                <div class="form-group"><label>Repetições *</label><input type="number" id="exEditReps" value="${ex.reps || ''}" /></div>
                                <div class="form-group"><label>Carga (kg) *</label><input type="number" step="0.5" id="exEditLoad" value="${ex.load || ''}" /></div>
                            </div>
                            <label>Meta de Carga (kg, opcional)</label>
                            <input type="number" step="0.5" id="exEditMetaCarga" value="${ex.metaCarga || ''}" style="background:#0a0a0a;border:1px solid #2a2a2a;color:#ddd;padding:6px;border-radius:4px;width:100%;margin:3px 0;" />
                            <label>Descanso entre séries (opcional)</label>
                            <div style="display:flex;gap:4px;align-items:center;">
                                <input type="number" id="exEditDescansoMin" value="${descMins}" placeholder="Min" style="background:#0a0a0a;border:1px solid #2a2a2a;color:#ddd;padding:6px;border-radius:4px;width:60px;" />
                                <span style="color:#888;">:</span>
                                <input type="number" id="exEditDescansoSec" value="${descSecs}" placeholder="Seg" style="background:#0a0a0a;border:1px solid #2a2a2a;color:#ddd;padding:6px;border-radius:4px;width:60px;" />
                            </div>
                            <div class="checkbox-row">
                                <input type="checkbox" id="exEditWarmup" ${ex.warmup ? 'checked' : ''} />
                                <label for="exEditWarmup">Série de aquecimento</label>
                            </div>
                            ${evoHtml}
                            <div class="btn-row">
                                <button class="btn-secondary" id="cancelEditExBtn">Cancelar</button>
                                <button class="btn-primary" id="saveEditExBtn">Salvar</button>
                            </div>
                        `);

                        document.getElementById('editLoadHistoryBtn')?.addEventListener('click', function() {
                            closeSubModal();
                            const history = ex.loadHistory || [];
                            let listHtml = '';
                            if (history.length) {
                                history.forEach((h, i) => {
                                    listHtml += `<div class="history-item">
                                        <span>${h.load}kg x ${h.reps || '?'} reps (${h.data || '--'})</span>
                                        <div class="history-actions">
                                            <button data-idx="${i}" data-action="edit-load">✎</button>
                                            <button data-idx="${i}" data-action="delete-load">✕</button>
                                        </div>
                                    </div>`;
                                });
                            } else { listHtml = '<div class="small-note">Nenhum registro.</div>'; }
                            openSubModal(`
                                <h3>Histórico de Carga - ${ex.exercise}</h3>
                                <div class="history-list">${listHtml}</div>
                                <div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap;justify-content:center;">
                                    <button class="btn-danger" id="deleteAllLoad">Excluir Todo Histórico</button>
                                </div>
                                <div class="btn-row"><button class="btn-secondary" id="closeLoadHistoryBtn">Fechar</button></div>
                            `);

                            document.getElementById('deleteAllLoad')?.addEventListener('click', function() {
                                mostrarConfirmacao('Excluir Histórico', 'Tem certeza que deseja excluir todo o histórico de carga?', function(ok) {
                                    if (ok) {
                                        ex.loadHistory = [];
                                        saveConfig().then(() => { closeSubModal(); renderConfig(); });
                                    }
                                });
                            });

                            document.querySelectorAll('#subModal [data-action="delete-load"]').forEach(btn => {
                                btn.addEventListener('click', function() {
                                    const i = parseInt(this.dataset.idx);
                                    mostrarConfirmacao('Excluir Registro', 'Tem certeza que deseja excluir este registro?', function(ok) {
                                        if (ok) {
                                            ex.loadHistory.splice(i, 1);
                                            saveConfig().then(() => { closeSubModal(); renderConfig(); });
                                        }
                                    });
                                });
                            });

                            document.querySelectorAll('#subModal [data-action="edit-load"]').forEach(btn => {
                                btn.addEventListener('click', function() {
                                    const i = parseInt(this.dataset.idx);
                                    const item = ex.loadHistory[i];
                                    closeSubModal();
                                    openSubModal(`
                                        <h3>Editar Registro</h3>
                                        <label>Carga (kg)</label>
                                        <input type="number" step="0.5" id="editLoadVal" value="${item.load}" style="background:#0a0a0a;border:1px solid #2a2a2a;color:#ddd;padding:6px;border-radius:4px;width:100%;margin:3px 0;" />
                                        <label>Repetições</label>
                                        <input type="number" id="editLoadReps" value="${item.reps || ''}" style="background:#0a0a0a;border:1px solid #2a2a2a;color:#ddd;padding:6px;border-radius:4px;width:100%;margin:3px 0;" />
                                        <label>Data</label>
                                        <input type="text" id="editLoadData" value="${item.data || ''}" placeholder="dd/mm/aaaa" style="background:#0a0a0a;border:1px solid #2a2a2a;color:#ddd;padding:6px;border-radius:4px;width:100%;margin:3px 0;" />
                                        <div class="btn-row">
                                            <button class="btn-secondary" id="cancelEditLoadBtn">Cancelar</button>
                                            <button class="btn-primary" id="saveEditLoadBtn">Salvar</button>
                                        </div>
                                    `);
                                    document.getElementById('cancelEditLoadBtn').onclick = function() {
                                        closeSubModal();
                                        renderConfig();
                                    };
                                    document.getElementById('saveEditLoadBtn').onclick = function() {
                                        const val = parseFloat(document.getElementById('editLoadVal').value);
                                        const reps = parseInt(document.getElementById('editLoadReps').value);
                                        const data = document.getElementById('editLoadData').value.trim();
                                        if (isNaN(val) || val <= 0) { alert('Carga inválida.'); return; }
                                        if (isNaN(reps) || reps < 1) { alert('Repetições inválidas.'); return; }
                                        if (!data) { alert('Data inválida.'); return; }
                                        ex.loadHistory[i] = { load: val, reps: reps, date: data };
                                        saveConfig().then(() => { closeSubModal(); renderConfig(); });
                                    };
                                });
                            });

                            document.getElementById('closeLoadHistoryBtn').onclick = function() {
                                closeSubModal();
                                renderConfig();
                            };
                        });

                        if (!ex.warmup) {
                            document.getElementById('addEvoBtn')?.addEventListener('click', function() {
                                const load = parseFloat(document.getElementById('evoLoad').value);
                                const reps = parseInt(document.getElementById('evoReps').value);
                                if (isNaN(load) || load <= 0) { alert('Carga inválida.'); return; }
                                if (isNaN(reps) || reps < 1) { alert('Repetições inválidas.'); return; }
                                const today = new Date().toISOString().split('T')[0].split('-').reverse().join('/');
                                if (!ex.loadHistory) ex.loadHistory = [];
                                ex.loadHistory.push({ load, reps, date: today });
                                ex.load = load;
                                ex.reps = reps;
                                saveConfig().then(() => { closeSubModal(); renderConfig(); });
                            });
                        }

                        document.getElementById('cancelEditExBtn').onclick = closeSubModal;
                        document.getElementById('saveEditExBtn').onclick = function() {
                            const exercise = document.getElementById('exEditNome').value.trim();
                            const sets = parseInt(document.getElementById('exEditSets').value);
                            const reps = parseInt(document.getElementById('exEditReps').value);
                            const load = parseFloat(document.getElementById('exEditLoad').value);
                            const metaCarga = parseFloat(document.getElementById('exEditMetaCarga').value);
                            const descMin = parseInt(document.getElementById('exEditDescansoMin').value) || 0;
                            const descSec = parseInt(document.getElementById('exEditDescansoSec').value) || 0;
                            const descanso = descMin * 60 + descSec;
                            const warmup = document.getElementById('exEditWarmup').checked;

                            if (!exercise) { alert('Nome do exercício é obrigatório.'); return; }
                            if (isNaN(sets) || sets < 1) { alert('Número de séries inválido.'); return; }
                            if (isNaN(reps) || reps < 1) { alert('Número de repetições inválido.'); return; }
                            if (isNaN(load) || load <= 0) { alert('Carga inválida.'); return; }

                            ex.exercise = exercise;
                            ex.sets = sets;
                            ex.reps = reps;
                            ex.load = load;
                            ex.metaCarga = isNaN(metaCarga) ? null : metaCarga;
                            ex.descanso = descanso > 0 ? descanso : null;
                            ex.warmup = warmup;
                            saveConfig().then(() => { closeSubModal(); renderConfig(); });
                        };
                    });
                });

                lista.querySelectorAll('[data-action="delete-exercicio-lista"]').forEach(b => {
                    b.addEventListener('click', function() {
                        const idx = parseInt(this.dataset.idx);
                        mostrarConfirmacao('Excluir Exercício', 'Tem certeza que deseja excluir este exercício?', function(ok) {
                            if (ok) {
                                configData.academia.treinos[treinoIdx].exercicios.splice(idx, 1);
                                saveConfig().then(() => {
                                    renderExerciciosLista(treinoIdx, container);
                                    renderConfig();
                                });
                            }
                        });
                    });
                });
            }

            function renderConfig() {
                configTitle.textContent = modoVisualizacao ? 'Academia - Visão Geral' : 'Configurações';
                const data = configData.academia;
                let html = '';

                const diasFreq = getDiasFrequentados();
                html += `<label>Data de Início</label>
                        <div class="value-display">
                            <span>${formatDataBR(data.inicio)} ${diasFreq > 0 ? `(${diasFreq} dias)` : ''}</span>
                            ${!modoVisualizacao ? `<button class="action-btn" id="editInicioBtn">Editar</button>` : ''}
                        </div>`;

                const peso = data.peso;
                let evolucaoPeso = { status: 'neutra', texto: 'Sem dados', pct: 0 };
                if (peso.historico && peso.historico.length >= 2) {
                    const primeiro = peso.historico[0];
                    const ultimo = peso.historico[peso.historico.length - 1];
                    const diff = ultimo.peso - primeiro.peso;
                    const pct = primeiro.peso !== 0 ? (diff / primeiro.peso) * 100 : 0;
                    const meta = peso.meta;
                    let status = 'neutra';
                    if (meta !== null) {
                        if (meta < primeiro.peso && diff < 0) status = 'verde';
                        else if (meta > primeiro.peso && diff > 0) status = 'verde';
                        else if (diff > 0) status = 'verde';
                        else if (diff < 0) status = 'vermelha';
                        else status = 'neutra';
                    } else {
                        status = diff > 0 ? 'verde' : (diff < 0 ? 'vermelha' : 'neutra');
                    }
                    evolucaoPeso = { status, texto: `${diff > 0 ? '+' : ''}${diff.toFixed(1)}kg (${pct > 0 ? '+' : ''}${pct.toFixed(1)}%)`, pct };
                }

                if (modoVisualizacao) {
                    html += `<div class="sub-section"><h4>Evolução do Peso</h4>
                        <div class="value-display">
                            <span>Peso Atual: ${peso.atual !== null ? peso.atual + ' kg' : '--'}</span>
                            <span class="evolucao-${evolucaoPeso.status}">${evolucaoPeso.texto}</span>
                            <span class="status-dot ${evolucaoPeso.status}"></span>
                        </div>`;
                    if (peso.historico && peso.historico.length > 0) {
                        html += gerarGrafico(peso.historico, 'Histórico de Peso');
                    }
                    html += `<div class="small-note">Última pesagem: ${getUltimaPesagemData()}</div>`;
                    if (peso.meta !== null) html += `<div class="small-note">Meta: ${peso.meta} kg</div>`;
                    html += `</div>`;

                    const todosExercicios = [];
                    (data.treinos || []).forEach(t => {
                        (t.exercicios || []).forEach(e => {
                            if (!e.warmup) {
                                todosExercicios.push({ ...e, treinoNome: t.nome });
                            }
                        });
                    });

                    html += `<div class="sub-section"><h4>Evolução de Carga</h4>
                        <table class="evo-table">
                            <tr><th>Exercício</th><th>Evolução</th><th>Variação</th></tr>`;
                    todosExercicios.forEach(ex => {
                        const evo = calcularEvolucaoCarga(ex);
                        const diff = evo.diff || 0;
                        const statusClass = evo.status === 'verde' ? 'evolucao-verde' : (evo.status === 'vermelha' ? 'evolucao-vermelha' : 'evolucao-neutra');
                        html += `<tr class="clickable" data-exercicio="${ex.exercise}" data-idx="${todosExercicios.indexOf(ex)}">
                            <td>${ex.exercise}</td>
                            <td class="${statusClass}">${evo.texto}</td>
                            <td>${diff > 0 ? '+' : ''}${diff.toFixed(1)}kg</td>
                        </tr>`;
                    });
                    html += `</table>
                        <button class="full-btn" id="verGraficoBtn">Ver Gráfico</button>
                    </div>`;

                    html += `<div class="sub-section"><h4>Resumo</h4>
                        <div class="value-display"><span>Data Início: ${formatDataBR(data.inicio)}</span></div>
                        <div class="value-display"><span>Peso Atual: ${peso.atual !== null ? peso.atual + ' kg' : '--'}</span></div>
                        <div class="value-display"><span>Meta: ${peso.meta !== null ? peso.meta + ' kg' : 'Não definida'}</span></div>
                        <div class="value-display"><span>Intervalo Pesagem: ${peso.intervalo || 7} dias</span></div>
                        <div class="value-display"><span>Última pesagem: ${getUltimaPesagemData()}</span></div>
                        <div class="value-display"><span>Dias frequentados: ${diasFreq}</span></div>
                        </div>`;

                    html += `<div class="sub-section"><h4>Objetivos</h4>`;
                    const objs = data.objetivos || [];
                    if (objs.length) {
                        objs.forEach(obj => { html += `<div class="config-item"><span>${obj}</span></div>`; });
                    } else { html += `<div class="small-note">Nenhum objetivo definido.</div>`; }
                    html += `</div>`;

                    html += `<div class="sub-section"><h4>Dias de Descanso</h4>
                        <div style="display:flex;flex-wrap:wrap;gap:4px;margin:4px 0;">`;
                    (data.diasDescanso || []).forEach(d => {
                        html += `<span style="background:#1a1a1a;padding:2px 8px;border-radius:4px;border:1px solid #2a2a2a;font-size:0.8rem;">${d}</span>`;
                    });
                    if ((data.diasDescanso || []).length === 0) html += `<span class="small-note">Nenhum dia de descanso</span>`;
                    html += `</div></div>`;

                    html += `<div class="sub-section"><h4>Roupas</h4>`;
                    ['camisas', 'calcas', 'tenis'].forEach(cat => {
                        const label = cat === 'camisas' ? 'Camisas' : cat === 'calcas' ? 'Calças' : 'Tênis';
                        const items = data.roupas[cat] || [];
                        html += `<div style="margin:3px 0;"><label style="font-size:0.7rem;color:#888;">${label}</label>`;
                        if (items.length) {
                            items.forEach(item => { html += `<div class="clothe-item"><span>${item}</span></div>`; });
                        } else { html += `<div class="small-note">Nenhuma ${label.toLowerCase()}.</div>`; }
                        html += `</div>`;
                    });
                    html += `</div>`;

                    html += `<div class="sub-section"><h4>Combinações</h4>`;
                    const combos = data.combinacoes || {};
