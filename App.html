                    const workingDays = DIAS_SEMANA.filter(d => !(data.diasDescanso || []).includes(d));
                    if (workingDays.length) {
                        workingDays.forEach(day => {
                            const c = combos[day] || [];
                            html += `<div style="margin:3px 0;background:#0d0d0d;padding:4px 6px;border-radius:4px;border:1px solid #1a1a1a;">
                                <strong style="color:#aaa;font-size:0.8rem;">${day}</strong>`;
                            if (c.length) {
                                c.forEach(combo => { html += `<div class="combo-item"><span class="combo-text">${combo}</span></div>`; });
                            } else { html += `<div class="small-note">Nenhuma combinação.</div>`; }
                            html += `</div>`;
                        });
                    } else { html += `<div class="small-note">Nenhum dia disponível.</div>`; }
                    html += `</div>`;

                    configContent.innerHTML = html;

                    document.getElementById('verGraficoBtn')?.addEventListener('click', function() {
                        let graphHtml = `<h3>Gráficos de Evolução</h3>`;
                        if (peso.historico && peso.historico.length > 0) {
                            graphHtml += gerarGrafico(peso.historico, 'Evolução do Peso');
                        }
                        todosExercicios.forEach(ex => {
                            if (ex.loadHistory && ex.loadHistory.length > 0) {
                                graphHtml += gerarGrafico(ex.loadHistory, ex.exercise);
                            } else {
                                graphHtml += `<div class="small-note">${ex.exercise}: sem dados suficientes</div>`;
                            }
                        });
                        openSubModal(graphHtml + `<div class="btn-row"><button class="btn-secondary" id="closeGraphBtn">Fechar</button></div>`);
                        document.getElementById('closeGraphBtn')?.addEventListener('click', closeSubModal);
                    });

                    document.querySelectorAll('.evo-table .clickable').forEach(row => {
                        row.addEventListener('click', function() {
                            const idx = parseInt(this.dataset.idx);
                            const ex = todosExercicios[idx];
                            if (ex && ex.loadHistory && ex.loadHistory.length > 0) {
                                const graphHtml = gerarGrafico(ex.loadHistory, ex.exercise);
                                openSubModal(graphHtml + `<div class="btn-row"><button class="btn-secondary" id="closeGraphBtn">Fechar</button></div>`);
                                document.getElementById('closeGraphBtn')?.addEventListener('click', closeSubModal);
                            } else {
                                mostrarConfirmacao('Aviso', 'Este exercício não tem dados suficientes para gráfico.', function(ok){});
                            }
                        });
                    });

                } else {
                    html += `<label>Data de Início</label>
                            <div class="value-display">
                                <span>${formatDataBR(data.inicio)} ${diasFreq > 0 ? `(${diasFreq} dias)` : ''}</span>
                                <button class="action-btn" id="editInicioBtn">Editar</button>
                            </div>`;

                    html += `<label>Peso Atual</label>
                            <div class="value-display">
                                <span>${peso.atual !== null ? peso.atual + ' kg' : '--'}</span>
                                <div style="display:flex;gap:4px;">
                                    <button class="action-btn" id="addPesoBtn">Registrar</button>
                                    <button class="action-btn secondary" id="showPesoHistoryBtn">Histórico</button>
                                </div>
                            </div>`;

                    html += `<label>Intervalo para Pesagem (dias)</label>
                            <div class="value-display">
                                <span>${peso.intervalo || 7} dias</span>
                                <button class="action-btn" id="editIntervaloBtn">Editar</button>
                            </div>`;

                    if (peso.meta !== null) {
                        html += `<div class="small-note">Meta: ${peso.meta} kg</div>`;
                    }

                    html += `<label>Dias de Descanso</label>
                            <div class="checkbox-grid">`;
                    DIAS_SEMANA.forEach(d => {
                        const checked = (data.diasDescanso || []).includes(d) ? 'checked' : '';
                        html += `<div class="checkbox-row">
                                    <input type="checkbox" id="desc_${d}" ${checked} value="${d}" />

                                </div>
                                <div class="checkbox-row">
                                    <input type="checkbox" id="exWarmup" />
                                    <label for="exWarmup">Série de aquecimento</label>
                                </div>
                                <div class="btn-row">
                                    <button class="btn-secondary" id="cancelExBtn">Cancelar</button>
                                    <button class="btn-primary" id="saveExBtn">Salvar</button>
                                </div>
                            `);
                            document.getElementById('cancelExBtn').onclick = closeSubModal;
                            document.getElementById('saveExBtn').onclick = function() {
                                const exercise = document.getElementById('exNome').value.trim();
                                const sets = parseInt(document.getElementById('exSets').value);
                                const reps = parseInt(document.getElementById('exReps').value);
                                const load = parseFloat(document.getElementById('exLoad').value);
                                const metaCarga = parseFloat(document.getElementById('exMetaCarga').value);
                                const descMin = parseInt(document.getElementById('exDescansoMin').value) || 0;
                                const descSec = parseInt(document.getElementById('exDescansoSec').value) || 0;
                                const descanso = descMin * 60 + descSec;
                                const warmup = document.getElementById('exWarmup').checked;

                                if (!exercise) { alert('Nome do exercício é obrigatório.'); return; }
                                if (isNaN(sets) || sets < 1) { alert('Número de séries inválido.'); return; }
                                if (isNaN(reps) || reps < 1) { alert('Número de repetições inválido.'); return; }
                                if (isNaN(load) || load <= 0) { alert('Carga inválida.'); return; }

                                const exercicio = {
                                    exercise, sets, reps, load,
                                    metaCarga: isNaN(metaCarga) ? null : metaCarga,
                                    descanso: descanso > 0 ? descanso : null,
                                    warmup, loadHistory: []
                                };
                                if (!treino.exercicios) treino.exercicios = [];
                                treino.exercicios.push(exercicio);
                                saveConfig().then(() => { closeSubModal(); renderConfig(); });
                            };
                        });
                    });

                    document.querySelectorAll('[data-action="add-roupa"]').forEach(b => {
                        b.addEventListener('click', function() {
                            const cat = this.dataset.cat;
                            const label = cat === 'camisas' ? 'Camisa' : cat === 'calcas' ? 'Calça' : 'Tênis';
                            openSubModal(`
                                <h3>Nova ${label}</h3>
                                <input type="text" id="novaRoupaInput" placeholder="Nome da ${label.toLowerCase()}" style="background:#0a0a0a;border:1px solid #2a2a2a;color:#ddd;padding:6px;border-radius:4px;width:100%;margin:8px 0;" />
                                <div class="checkbox-row">
                                    <input type="checkbox" id="roupaSweat" />
                                    <label for="roupaSweat">Marca suor</label>
                                </div>
                                <div class="btn-row">
                                    <button class="btn-secondary" id="cancelRoupaBtn">Cancelar</button>
                                    <button class="btn-primary" id="saveRoupaBtn">Salvar</button>
                                </div>
                            `);
                            document.getElementById('cancelRoupaBtn').onclick = closeSubModal;
                            document.getElementById('saveRoupaBtn').onclick = function() {
                                let val = document.getElementById('novaRoupaInput').value.trim();
                                const sweat = document.getElementById('roupaSweat').checked;
                                if (!val) { alert('Nome é obrigatório.'); return; }
                                if (sweat) val += ' (suor)';
                                if (!configData.academia.roupas) configData.academia.roupas = { camisas: [], calcas: [], tenis: [] };
                                if (!configData.academia.roupas[cat]) configData.academia.roupas[cat] = [];
                                configData.academia.roupas[cat].push(val);
                                saveConfig().then(() => { closeSubModal(); renderConfig(); });
                            };
                        });
                    });

                    document.querySelectorAll('[data-action="delete-roupa"]').forEach(b => {
                        b.addEventListener('click', function() {
                            const cat = this.dataset.cat;
                            const idx = parseInt(this.dataset.idx);
                            mostrarConfirmacao('Excluir Roupa', 'Tem certeza que deseja excluir esta roupa?', function(ok) {
                                if (ok) {
                                    if (configData.academia.roupas && configData.academia.roupas[cat]) {
                                        configData.academia.roupas[cat].splice(idx, 1);
                                        saveConfig().then(() => renderConfig());
                                    }
                                }
                            });
                        });
                    });

                    document.querySelectorAll('[data-action="edit-roupa"]').forEach(b => {
                        b.addEventListener('click', function() {
                            const cat = this.dataset.cat;
                            const idx = parseInt(this.dataset.idx);
                            const item = configData.academia.roupas[cat][idx];
                            const isSweat = item.indexOf('(suor)') !== -1;
                            const cleanName = item.replace(' (suor)', '');
                            openSubModal(`
                                <h3>Editar Roupa</h3>
                                <input type="text" id="editRoupaInput" value="${cleanName}" style="background:#0a0a0a;border:1px solid #2a2a2a;color:#ddd;padding:6px;border-radius:4px;width:100%;margin:8px 0;" />
                                <div class="checkbox-row">
                                    <input type="checkbox" id="editRoupaSweat" ${isSweat ? 'checked' : ''} />
                                    <label for="editRoupaSweat">Marca suor</label>
                                </div>
                                <div class="btn-row">
                                    <button class="btn-secondary" id="cancelEditRoupaBtn">Cancelar</button>
                                    <button class="btn-primary" id="saveEditRoupaBtn">Salvar</button>
                                </div>
                            `);
                            document.getElementById('cancelEditRoupaBtn').onclick = closeSubModal;
                            document.getElementById('saveEditRoupaBtn').onclick = function() {
                                let val = document.getElementById('editRoupaInput').value.trim();
                                const sweat = document.getElementById('editRoupaSweat').checked;
                                if (!val) { alert('Nome é obrigatório.'); return; }
                                if (sweat) val += ' (suor)';
                                configData.academia.roupas[cat][idx] = val;
                                saveConfig().then(() => { closeSubModal(); renderConfig(); });
                            };
                        });
                    });

                    document.querySelectorAll('[data-action="add-combo"]').forEach(b => {
                        b.addEventListener('click', function() {
                            const day = this.dataset.day;
                            const camisa = document.getElementById(`comboCamisa_${day}`)?.value || '';
                            const calca = document.getElementById(`comboCalca_${day}`)?.value || '';
                            const tenis = document.getElementById(`comboTenis_${day}`)?.value || '';
                            const comboText = [camisa, calca, tenis].filter(Boolean).join(', ');
                            if (!comboText) { alert('Selecione pelo menos uma peça.'); return; }
                            if (!configData.academia.combinacoes) configData.academia.combinacoes = {};
                            if (!configData.academia.combinacoes[day]) configData.academia.combinacoes[day] = [];
                            configData.academia.combinacoes[day].push(comboText);
                            saveConfig().then(() => renderConfig());
                        });
                    });

                    document.querySelectorAll('[data-action="delete-combo"]').forEach(b => {
                        b.addEventListener('click', function() {
                            const day = this.dataset.day;
                            const idx = parseInt(this.dataset.idx);
                            mostrarConfirmacao('Excluir Combinação', 'Tem certeza que deseja excluir esta combinação?', function(ok) {
                                if (ok) {
                                    if (configData.academia.combinacoes && configData.academia.combinacoes[day]) {
                                        configData.academia.combinacoes[day].splice(idx, 1);
                                        if (configData.academia.combinacoes[day].length === 0) {
                                            delete configData.academia.combinacoes[day];
                                        }
                                        saveConfig().then(() => renderConfig());
                                    }
                                }
                            });
                        });
                    });
                }
            }

            menuAcademiaBtn.addEventListener('click', function() {
                closeMenu();
                openConfig('view');
            });

            menuConfigBtn.addEventListener('click', function() {
                closeMenu();
                openConfig('edit');
            });

            function verificarTreinoConcluido() {
                const hojeKey = getTodayKey();
                if (configData.academia.treinoConcluido && configData.academia.treinoConcluido[hojeKey]) {
                    return;
                }
                if (configData.academia[`treino_${hojeKey}`]) {
                    treinoAtual = configData.academia[`treino_${hojeKey}`];
                    if (treinoAtual && treinoAtual.exercicios) {
                        const allDone = treinoAtual.exercicios.every(e => (e._seriesFeitas || 0) >= (e.sets || 1));
                        if (allDone) {
                            configData.academia.treinoConcluido[hojeKey] = true;
                            configData.academia[`treino_${hojeKey}`] = null;
                            saveConfig();
                        } else {
                            exercicioAtualIndex = 0;
                            for (let i = 0; i < treinoAtual.exercicios.length; i++) {
                                if ((treinoAtual.exercicios[i]._seriesFeitas || 0) < (treinoAtual.exercicios[i].sets || 1)) {
                                    exercicioAtualIndex = i;
                                    break;
                                }
                            }
                            document.getElementById('todayCard').classList.add('active');
                            btn.classList.add('active');
                            isActive = true;
                            botaoVerde = true;
                            renderTreinoCard();
                        }
                    }
                }
            }

            openDB().then(database => {
                db = database;
                return loadConfig();
            }).catch(() => {
                configData = {
                    academia: {
                        inicio: '2026-06-30',
                        peso: { atual: null, historico: [], meta: null, intervalo: 7, ultimoRegistro: null },
                        diasDescanso: [],
                        objetivos: [],
                        roupas: { camisas: [], calcas: [], tenis: [] },
                        combinacoes: {},
                        treinos: [],
                        treinoConcluido: {}
                    }
                };
            }).finally(() => {
                verificarTreinoConcluido();
            });

            btn.textContent = '';
        })();
    </script>
</body>
</html>
