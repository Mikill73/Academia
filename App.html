<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #121212;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            touch-action: manipulation;
            position: relative;
            overflow: hidden;
        }
        .hamburger {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            padding: 8px;
            background: transparent;
            border: none;
            z-index: 10;
            touch-action: manipulation;
        }
        .hamburger span {
            display: block;
            width: 28px;
            height: 3px;
            background: #fff;
            border-radius: 2px;
            transition: 0.2s;
        }
        .circle-btn {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            background: #ff0000;
            border: none;
            color: #fff;
            font-size: 0;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.4);
            transition: transform 0.1s ease, box-shadow 0.2s ease, background 0.3s ease;
            touch-action: manipulation;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .circle-btn.active {
            background: #00cc00;
            box-shadow: 0 0 40px rgba(0, 204, 0, 0.5);
        }
        .circle-btn:active {
            transform: scale(0.92);
        }
        @media (max-width: 480px) {
            .circle-btn {
                width: 180px;
                height: 180px;
            }
        }
        @media (max-width: 360px) {
            .circle-btn {
                width: 150px;
                height: 150px;
            }
        }
        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 20;
            display: none;
            justify-content: flex-start;
            align-items: stretch;
            padding: 0;
        }
        .menu-overlay.open {
            display: flex;
        }
        .menu-panel {
            background: #1a1a1a;
            width: 280px;
            height: 100%;
            border-radius: 0 12px 12px 0;
            padding: 20px 12px;
            box-shadow: 4px 0 20px rgba(0,0,0,0.7);
            border-right: 1px solid #2a2a2a;
            animation: slideIn 0.25s ease;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        @keyframes slideIn {
            from { transform: translateX(-100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .menu-panel .close-btn {
            color: #888;
            font-size: 1.6rem;
            text-align: right;
            padding: 4px 12px;
            border-bottom: 1px solid #2a2a2a;
            margin-bottom: 6px;
            cursor: pointer;
            flex-shrink: 0;
        }
        .menu-panel .close-btn:hover {
            color: #fff;
        }
        .menu-panel button {
            background: transparent;
            border: none;
            color: #ccc;
            padding: 14px 16px;
            text-align: left;
            font-size: 1.1rem;
            width: 100%;
            cursor: pointer;
            border-bottom: 1px solid #2a2a2a;
            transition: 0.15s;
            touch-action: manipulation;
            flex-shrink: 0;
        }
        .menu-panel button:last-child {
            border-bottom: none;
        }
        .menu-panel button:hover {
            background: #2a2a2a;
            color: #fff;
        }
        .config-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 30;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .config-modal.open {
            display: flex;
        }
        .config-box {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 24px 20px;
            max-width: 420px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            color: #ddd;
            box-shadow: 0 8px 40px rgba(0,0,0,0.9);
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.96); }
            to { opacity: 1; transform: scale(1); }
        }
        .config-box .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2a2a2a;
            padding-bottom: 10px;
            margin-bottom: 14px;
        }
        .config-box .header h3 {
            color: #aaa;
            font-weight: 400;
            font-size: 1.2rem;
            margin: 0;
        }
        .config-box .header .back-btn {
            background: none;
            border: none;
            color: #888;
            font-size: 1.4rem;
            cursor: pointer;
            padding: 0 8px;
            touch-action: manipulation;
        }
        .config-box .header .back-btn:hover {
            color: #fff;
        }
        .config-box label {
            color: #888;
            font-size: 0.8rem;
            display: block;
            margin: 12px 0 4px 0;
            letter-spacing: 0.3px;
        }
        .config-box .value-display {
            background: #0d0d0d;
            border: 1px solid #2a2a2a;
            border-radius: 4px;
            padding: 8px 12px;
            color: #eee;
            font-size: 1.1rem;
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .config-box .value-display .action-btn {
            background: #1a3a1a;
            border: 1px solid #2a5a2a;
            color: #8bc34a;
            padding: 4px 12px;
            border-radius: 4px;
            cursor: pointer;
            touch-action: manipulation;
            font-size: 0.8rem;
        }
        .config-box .value-display .action-btn:hover {
            background: #1f4a1f;
        }
        .config-box .value-display .action-btn.danger {
            background: #3a1a1a;
            border-color: #5a2a2a;
            color: #ff8a8a;
        }
        .config-box .value-display .action-btn.danger:hover {
            background: #4a1a1a;
        }
        .config-box .value-display .action-btn.secondary {
            background: #2a2a2a;
            border-color: #3a3a3a;
            color: #ccc;
        }
        .config-box .value-display .action-btn.secondary:hover {
            background: #3a3a3a;
        }
        .config-box .small-note {
            color: #666;
            font-size: 0.75rem;
            margin-top: 2px;
        }
        .config-box .checkbox-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 4px 12px;
            margin: 4px 0 8px 0;
        }
        .config-box .checkbox-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 4px 0;
        }
        .config-box .checkbox-row input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #666;
            margin: 0;
            flex-shrink: 0;
        }
        .config-box .checkbox-row label {
            margin: 0;
            color: #aaa;
            font-size: 0.85rem;
        }
        .config-item {
            background: #0d0d0d;
            border: 1px solid #2a2a2a;
            padding: 8px 12px;
            border-radius: 4px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .config-item span {
            color: #eee;
            word-break: break-word;
        }
        .config-item .del-btn {
            color: #f66;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            padding: 0 6px;
            touch-action: manipulation;
            flex-shrink: 0;
        }
        .config-item .del-btn:hover {
            color: #f00;
        }
        .config-item .edit-btn {
            color: #88aaff;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            padding: 0 6px;
            touch-action: manipulation;
            flex-shrink: 0;
        }
        .config-item .edit-btn:hover {
            color: #aaccff;
        }
        .config-item .item-actions {
            display: flex;
            gap: 4px;
        }
        .add-area {
            display: flex;
            gap: 6px;
            margin-top: 6px;
            flex-wrap: wrap;
        }
        .add-area button {
            padding: 6px 14px;
            background: #1a3a1a;
            color: #8bc34a;
            border: 1px solid #2a5a2a;
            border-radius: 4px;
            cursor: pointer;
            touch-action: manipulation;
            white-space: nowrap;
        }
        .add-area button:hover {
            background: #1f4a1f;
        }
        .goal-tag {
            display: inline-block;
            background: #1a2a1a;
            color: #8bc34a;
            padding: 1px 8px;
            border-radius: 10px;
            font-size: 0.7rem;
            border: 1px solid #2a4a2a;
            margin-left: 6px;
        }
        .sub-section {
            border-top: 1px solid #2a2a2a;
            padding-top: 12px;
            margin-top: 12px;
        }
        .sub-section h4 {
            color: #999;
            font-weight: 400;
            margin-bottom: 6px;
            font-size: 0.95rem;
        }
        .training-entry {
            background: #0d0d0d;
            border-left: 2px solid #3a4a3a;
            padding: 4px 8px;
            margin-bottom: 4px;
            border-radius: 2px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .training-entry .training-text {
            color: #bbb;
            font-size: 0.85rem;
        }
        .training-entry .training-actions {
            display: flex;
            gap: 3px;
        }
        .training-entry .training-actions button {
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            font-size: 0.9rem;
            padding: 0 4px;
        }
        .training-entry .training-actions button:hover {
            color: #ddd;
        }
        .clothe-item {
            background: #0d0d0d;
            padding: 4px 8px;
            border-left: 2px solid #2a2a2a;
            margin-bottom: 3px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .clothe-item span {
            color: #ccc;
        }
        .combo-item {
            background: #0d0d0d;
            padding: 4px 8px;
            border: 1px solid #1a1a1a;
            border-radius: 2px;
            margin: 2px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .combo-item .combo-text {
            color: #ccc;
            font-size: 0.85rem;
        }
        .combo-selects {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            align-items: center;
            margin: 4px 0;
        }
        .combo-selects select {
            background: #0a0a0a;
            border: 1px solid #2a2a2a;
            color: #ddd;
            padding: 4px 6px;
            border-radius: 2px;
            font-size: 0.8rem;
            min-width: 80px;
            flex: 1;
        }
        .history-list {
            max-height: 200px;
            overflow-y: auto;
            margin: 6px 0;
        }
        .history-list .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 8px;
            border-bottom: 1px solid #1a1a1a;
        }
        .history-list .history-item span {
            color: #bbb;
            font-size: 0.85rem;
        }
        .history-list .history-item .history-actions {
            display: flex;
            gap: 4px;
        }
        .history-list .history-item .history-actions button {
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            font-size: 0.8rem;
            padding: 0 4px;
        }
        .history-list .history-item .history-actions button:hover {
            color: #ddd;
        }
        .evolution-area {
            background: #1a2a0a;
            border: 1px solid #2a4a2a;
            border-radius: 4px;
            padding: 8px 10px;
            margin-top: 6px;
        }
        .evolution-area .evo-row {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            align-items: center;
        }
        .evolution-area .evo-row button {
            padding: 4px 12px;
            background: #1a3a1a;
            color: #8bc34a;
            border: 1px solid #2a5a2a;
            border-radius: 4px;
            cursor: pointer;
            touch-action: manipulation;
        }
        .evolution-area .evo-row button:hover {
            background: #1f4a1f;
        }
        .evolution-history {
            color: #888;
            font-size: 0.7rem;
            margin-top: 4px;
        }
        .day-select {
            background: #0a0a0a;
            border: 1px solid #2a2a2a;
            color: #ddd;
            padding: 4px 8px;
            border-radius: 2px;
            min-width: 100px;
        }
        .form-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .form-row .form-group {
            flex: 1;
            min-width: 70px;
        }
        .form-group label {
            color: #888;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin: 0 0 2px 0;
        }
        .form-group input {
            background: #0a0a0a;
            border: 1px solid #2a2a2a;
            color: #ddd;
            padding: 6px 8px;
            border-radius: 4px;
            width: 100%;
            font-size: 0.9rem;
        }
        .form-group input:focus {
            outline: 1px solid #555;
        }
        .btn-row {
            display: flex;
            gap: 8px;
            margin-top: 14px;
            justify-content: flex-end;
            flex-wrap: wrap;
        }
        .btn-row button {
            padding: 8px 18px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 0.9rem;
            touch-action: manipulation;
        }
        .btn-primary {
            background: #1a3a1a;
            color: #8bc34a;
            border: 1px solid #2a5a2a;
        }
        .btn-primary:hover {
            background: #1f4a1f;
        }
        .btn-secondary {
            background: #2a2a2a;
            color: #ccc;
            border: 1px solid #3a3a3a;
        }
        .btn-secondary:hover {
            background: #3a3a3a;
        }
        .btn-danger {
            background: #3a1a1a;
            color: #ff8a8a;
            border: 1px solid #5a2a2a;
        }
        .btn-danger:hover {
            background: #4a1a1a;
        }
        .mt-2 { margin-top: 8px; }
        .mb-2 { margin-bottom: 8px; }
    </style>
</head>
<body>
    <button class="hamburger" id="hamburgerBtn" aria-label="Menu">
        <span></span>
        <span></span>
        <span></span>
    </button>

    <button class="circle-btn" id="mainBtn"></button>

    <div class="menu-overlay" id="menuOverlay">
        <div class="menu-panel">
            <div class="close-btn" id="closeMenuBtn">✕</div>
            <button id="menuAcademiaBtn">Academia</button>
        </div>
    </div>

    <div class="config-modal" id="configModal">
        <div class="config-box" id="configBox">
            <div class="header">
                <button class="back-btn" id="backFromConfig">←</button>
                <h3 id="configTitle">Academia</h3>
                <div style="width:30px;"></div>
            </div>
            <div id="configContent"></div>
        </div>
    </div>

    <script>
        (function() {
            const DB_NAME = 'AcademiaDB';
            const STORE_NAME = 'academiaStore';

            let db = null;
            let configData = {
                academia: {
                    inicio: '2026-06-30',
                    peso: { atual: null, historico: [], meta: null },
                    diasDescanso: [],
                    objetivos: [],
                    roupas: { camisas: [], calcas: [], tenis: [] },
                    combinacoes: {},
                    treinos: []
                }
            };

            const DIAS_SEMANA = ['Segunda', 'Terça', 'Quarta', 'Quinta', 'Sexta', 'Sábado', 'Domingo'];

            function openDB() {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(DB_NAME, 3);
                    request.onupgradeneeded = (e) => {
                        const db = e.target.result;
                        if (!db.objectStoreNames.contains(STORE_NAME)) {
                            db.createObjectStore(STORE_NAME, { keyPath: 'id' });
                        }
                    };
                    request.onsuccess = (e) => resolve(e.target.result);
                    request.onerror = (e) => reject(e.target.error);
                });
            }

            function getStore(mode) {
                const tx = db.transaction(STORE_NAME, mode);
                return tx.objectStore(STORE_NAME);
            }

            function loadConfig() {
                return new Promise((resolve) => {
                    const store = getStore('readonly');
                    const req = store.get('main');
                    req.onsuccess = () => {
                        if (req.result && req.result.data) {
                            configData = req.result.data;
                        } else {
                            configData = {
                                academia: {
                                    inicio: '2026-06-30',
                                    peso: { atual: null, historico: [], meta: null },
                                    diasDescanso: [],
                                    objetivos: [],
                                    roupas: { camisas: [], calcas: [], tenis: [] },
                                    combinacoes: {},
                                    treinos: []
                                }
                            };
                        }
                        resolve();
                    };
                    req.onerror = () => {
                        configData = {
                            academia: {
                                inicio: '2026-06-30',
                                peso: { atual: null, historico: [], meta: null },
                                diasDescanso: [],
                                objetivos: [],
                                roupas: { camisas: [], calcas: [], tenis: [] },
                                combinacoes: {},
                                treinos: []
                            }
                        };
                        resolve();
                    };
                });
            }

            function saveConfig() {
                return new Promise((resolve) => {
                    const store = getStore('readwrite');
                    const req = store.put({ id: 'main', data: configData });
                    req.onsuccess = () => resolve();
                    req.onerror = () => resolve();
                });
            }

            const btn = document.getElementById('mainBtn');
            let isActive = false;

            btn.addEventListener('click', function() {
                isActive = !isActive;
                this.classList.toggle('active', isActive);
                this.textContent = isActive ? '' : '';
            });

            const hamburger = document.getElementById('hamburgerBtn');
            const menuOverlay = document.getElementById('menuOverlay');
            const closeMenuBtn = document.getElementById('closeMenuBtn');
            const menuAcademiaBtn = document.getElementById('menuAcademiaBtn');
            const configModal = document.getElementById('configModal');
            const backFromConfig = document.getElementById('backFromConfig');
            const configContent = document.getElementById('configContent');
            const configTitle = document.getElementById('configTitle');

            function openMenu() {
                menuOverlay.classList.add('open');
            }

            function closeMenu() {
                menuOverlay.classList.remove('open');
            }

            hamburger.addEventListener('click', openMenu);
            closeMenuBtn.addEventListener('click', closeMenu);
            menuOverlay.addEventListener('click', function(e) {
                if (e.target === this) closeMenu();
            });

            function openConfig() {
                configModal.classList.add('open');
                renderConfig();
            }

            function closeConfig() {
                configModal.classList.remove('open');
            }

            backFromConfig.addEventListener('click', function() {
                closeConfig();
                openMenu();
            });

            function renderConfig() {
                configTitle.textContent = 'Academia';
                const data = configData.academia;
                let html = '';

                html += `<label>Data de Início</label>
                        <div class="value-display">
                            <span>${data.inicio || 'Não definido'}</span>
                            <button class="action-btn" id="editInicioBtn">Editar</button>
                        </div>`;

                html += `<label>Peso Atual</label>
                        <div class="value-display">
                            <span>${data.peso.atual !== null ? data.peso.atual + ' kg' : '--'}</span>
                            <div style="display:flex;gap:4px;">
                                <button class="action-btn" id="addPesoBtn">Registrar</button>
                                <button class="action-btn secondary" id="showPesoHistoryBtn">Histórico</button>
                            </div>
                        </div>`;

                if (data.peso.meta !== null) {
                    html += `<div class="small-note">Meta: ${data.peso.meta} kg</div>`;
                }

                html += `<label>Dias de Descanso</label>
                        <div class="checkbox-grid">`;
                DIAS_SEMANA.forEach(d => {
                    const checked = (data.diasDescanso || []).includes(d) ? 'checked' : '';
                    html += `<div class="checkbox-row">
                                <input type="checkbox" id="desc_${d}" ${checked} value="${d}" />
                                <label for="desc_${d}">${d}</label>
                            </div>`;
                });
                html += `</div>`;

                html += `<div class="sub-section">
                            <h4>Objetivos</h4>`;
                const objs = data.objetivos || [];
                if (objs.length) {
                    objs.forEach((obj, idx) => {
                        html += `<div class="config-item">
                                    <span>${obj}</span>
                                    <div class="item-actions">
                                        <button class="edit-btn" data-idx="${idx}" data-type="objetivo" data-action="edit">✎</button>
                                        <button class="del-btn" data-idx="${idx}" data-type="objetivo" data-action="delete">✕</button>
                                    </div>
                                </div>`;
                    });
                } else {
                    html += `<div class="small-note">Nenhum objetivo definido.</div>`;
                }
                html += `<div class="add-area">
                            <button id="addObjetivoBtn">+ Adicionar Objetivo</button>
                        </div></div>`;

                html += `<div class="sub-section">
                            <h4>Treinos</h4>`;
                const treinos = data.treinos || [];
                if (treinos.length) {
                    treinos.forEach((treino, idx) => {
                        const dia = treino.dia || '';
                        const diaTag = dia ? `<span class="goal-tag">${dia}</span>` : '';
                        html += `<div class="config-item" style="flex-direction:column;align-items:stretch;gap:4px;">
                                    <div style="display:flex;justify-content:space-between;align-items:center;">
                                        <span><strong>${treino.nome || 'Treino'}</strong> ${diaTag}</span>
                                        <div class="item-actions">
                                            <button class="edit-btn" data-idx="${idx}" data-type="treino" data-action="edit">✎</button>
                                            <button class="del-btn" data-idx="${idx}" data-type="treino" data-action="delete">✕</button>
                                        </div>
                                    </div>`;
                        if (treino.exercicios && treino.exercicios.length) {
                            treino.exercicios.forEach((ex, exIdx) => {
                                const detalhes = [];
                                if (ex.exercise) detalhes.push(ex.exercise);
                                if (ex.sets) detalhes.push(ex.sets + ' séries');
                                if (ex.reps) detalhes.push(ex.reps + ' reps');
                                if (ex.load) detalhes.push(ex.load + 'kg');

                                <div class="form-group"><label>Repetições</label><input type="number" id="exEditReps" value="${ex.reps || ''}" /></div>
                                <div class="form-group"><label>Carga (kg)</label><input type="number" step="0.5" id="exEditLoad" value="${ex.load || ''}" /></div>
                            </div>
                            <div class="checkbox-row">
                                <input type="checkbox" id="exEditWarmup" ${ex.warmup ? 'checked' : ''} />
                                <label for="exEditWarmup">Série de aquecimento</label>
                            </div>
                            ${!ex.warmup ? `<div class="evolution-area">
                                <div style="display:flex;gap:4px;flex-wrap:wrap;align-items:center;">
                                    <input type="number" step="0.5" id="evoLoad" placeholder="Nova carga" style="flex:1;min-width:60px;background:#0a0a0a;border:1px solid #2a2a2a;color:#ddd;padding:6px;border-radius:4px;" />
                                    <input type="number" id="evoReps" placeholder="Novas reps" style="flex:1;min-width:60px;background:#0a0a0a;border:1px solid #2a2a2a;color:#ddd;padding:6px;border-radius:4px;" />
                                    <button id="addEvoBtn" style="padding:4px 12px;background:#1a3a1a;color:#8bc34a;border:1px solid #2a5a2a;border-radius:4px;cursor:pointer;">Registrar</button>
                                </div>
                                <div class="evolution-history">Histórico: ${(ex.loadHistory || []).map(h => h.load + 'kg x' + (h.reps || '?') + ' (' + h.date + ')').join(' → ') || 'Nenhum'}</div>
                            </div>` : ''}
                            <div class="btn-row">
                                <button class="btn-secondary" id="cancelEditExBtn">Cancelar</button>
                                <button class="btn-primary" id="saveEditExBtn">Salvar</button>
                            </div>
                        </div>`;
                        document.body.appendChild(overlay);

                        if (!ex.warmup) {
                            overlay.querySelector('#addEvoBtn')?.addEventListener('click', function() {
                                const load = parseFloat(overlay.querySelector('#evoLoad').value);
                                const reps = parseInt(overlay.querySelector('#evoReps').value);
                                if (isNaN(load) || load <= 0) { alert('Carga inválida.'); return; }
                                if (isNaN(reps) || reps < 1) { alert('Repetições inválidas.'); return; }
                                const today = new Date().toISOString().split('T')[0].split('-').reverse().join('/');
                                if (!ex.loadHistory) ex.loadHistory = [];
                                ex.loadHistory.push({ load, reps, date: today });
                                ex.load = load;
                                ex.reps = reps;
                                saveConfig().then(() => {
                                    overlay.remove();
                                    renderConfig();
                                });
                            });
                        }

                        overlay.querySelector('#cancelEditExBtn').onclick = () => overlay.remove();
                        overlay.querySelector('#saveEditExBtn').onclick = function() {
                            const exercise = overlay.querySelector('#exEditNome').value.trim();
                            const sets = parseInt(overlay.querySelector('#exEditSets').value);
                            const reps = parseInt(overlay.querySelector('#exEditReps').value);
                            const load = parseFloat(overlay.querySelector('#exEditLoad').value);
                            const warmup = overlay.querySelector('#exEditWarmup').checked;
                            if (!exercise) { alert('Nome do exercício é obrigatório.'); return; }
                            if (isNaN(sets) || sets < 1) { alert('Número de séries inválido.'); return; }
                            if (isNaN(reps) || reps < 1) { alert('Número de repetições inválido.'); return; }
                            ex.exercise = exercise;
                            ex.sets = sets;
                            ex.reps = reps;
                            ex.load = isNaN(load) ? null : load;
                            ex.warmup = warmup;
                            saveConfig().then(() => {
                                overlay.remove();
                                renderConfig();
                            });
                        };
                        overlay.addEventListener('click', function(e) {
                            if (e.target === this) this.remove();
                        });
                    });
                });

                document.querySelectorAll('[data-action="delete-exercicio"]').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const idx = parseInt(this.dataset.idx);
                        const exIdx = parseInt(this.dataset.exidx);
                        const treino = configData.academia.treinos[idx];
                        if (treino && treino.exercicios) {
                            treino.exercicios.splice(exIdx, 1);
                            saveConfig().then(() => renderConfig());
                        }
                    });
                });

                document.querySelectorAll('[data-action="add-roupa"]').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const cat = this.dataset.cat;
                        const label = cat === 'camisas' ? 'Camisa' : cat === 'calcas' ? 'Calça' : 'Tênis';
                        const overlay = document.createElement('div');
                        overlay.className = 'config-modal';
                        overlay.style.display = 'flex';
                        overlay.style.zIndex = '40';
                        overlay.innerHTML = `<div class="config-box" style="max-width:350px;">
                            <h3>Nova ${label}</h3>
                            <input type="text" id="novaRoupaInput" placeholder="Nome da ${label.toLowerCase()}" style="background:#0a0a0a;border:1px solid #2a2a2a;color:#ddd;padding:8px;border-radius:4px;width:100%;margin:10px 0;" />
                            <div class="checkbox-row">
                                <input type="checkbox" id="roupaSweat" />
                                <label for="roupaSweat">Marca suor 💦</label>
                            </div>
                            <div class="btn-row">
                                <button class="btn-secondary" id="cancelRoupaBtn">Cancelar</button>
                                <button class="btn-primary" id="saveRoupaBtn">Salvar</button>
                            </div>
                        </div>`;
                        document.body.appendChild(overlay);
                        overlay.querySelector('#cancelRoupaBtn').onclick = () => overlay.remove();
                        overlay.querySelector('#saveRoupaBtn').onclick = function() {
                            let val = overlay.querySelector('#novaRoupaInput').value.trim();
                            const sweat = overlay.querySelector('#roupaSweat').checked;
                            if (!val) { alert('Nome é obrigatório.'); return; }
                            if (sweat) val += ' 💦';
                            if (!configData.academia.roupas) configData.academia.roupas = { camisas: [], calcas: [], tenis: [] };
                            if (!configData.academia.roupas[cat]) configData.academia.roupas[cat] = [];
                            configData.academia.roupas[cat].push(val);
                            saveConfig().then(() => {
                                overlay.remove();
                                renderConfig();
                            });
                        };
                        overlay.addEventListener('click', function(e) {
                            if (e.target === this) this.remove();
                        });
                    });
                });

                document.querySelectorAll('[data-action="delete-roupa"]').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const cat = this.dataset.cat;
                        const idx = parseInt(this.dataset.idx);
                        if (configData.academia.roupas && configData.academia.roupas[cat]) {
                            configData.academia.roupas[cat].splice(idx, 1);
                            saveConfig().then(() => renderConfig());
                        }
                    });
                });

                document.querySelectorAll('[data-action="edit-roupa"]').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const cat = this.dataset.cat;
                        const idx = parseInt(this.dataset.idx);
                        const item = configData.academia.roupas[cat][idx];
                        const isSweat = item.indexOf('💦') !== -1;
                        const cleanName = item.replace(' 💦', '');
                        const overlay = document.createElement('div');
                        overlay.className = 'config-modal';
                        overlay.style.display = 'flex';
                        overlay.style.zIndex = '40';
                        overlay.innerHTML = `<div class="config-box" style="max-width:350px;">
                            <h3>Editar Roupa</h3>
                            <input type="text" id="editRoupaInput" value="${cleanName}" style="background:#0a0a0a;border:1px solid #2a2a2a;color:#ddd;padding:8px;border-radius:4px;width:100%;margin:10px 0;" />
                            <div class="checkbox-row">
                                <input type="checkbox" id="editRoupaSweat" ${isSweat ? 'checked' : ''} />
                                <label for="editRoupaSweat">Marca suor 💦</label>
                            </div>
                            <div class="btn-row">
                                <button class="btn-secondary" id="cancelEditRoupaBtn">Cancelar</button>
                                <button class="btn-primary" id="saveEditRoupaBtn">Salvar</button>
                            </div>
                        </div>`;
                        document.body.appendChild(overlay);
                        overlay.querySelector('#cancelEditRoupaBtn').onclick = () => overlay.remove();
                        overlay.querySelector('#saveEditRoupaBtn').onclick = function() {
                            let val = overlay.querySelector('#editRoupaInput').value.trim();
                            const sweat = overlay.querySelector('#editRoupaSweat').checked;
                            if (!val) { alert('Nome é obrigatório.'); return; }
                            if (sweat) val += ' 💦';
                            configData.academia.roupas[cat][idx] = val;
                            saveConfig().then(() => {
                                overlay.remove();
                                renderConfig();
                            });
                        };
                        overlay.addEventListener('click', function(e) {
                            if (e.target === this) this.remove();
                        });
                    });
                });

                document.querySelectorAll('[data-action="add-combo"]').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const day = this.dataset.day;
                        const camisa = document.getElementById(`comboCamisa_${day}`)?.value || '';
                        const calca = document.getElementById(`comboCalca_${day}`)?.value || '';
                        const tenis = document.getElementById(`comboTenis_${day}`)?.value || '';
                        const comboText = [camisa, calca, tenis].filter(Boolean).join(', ');
                        if (!comboText) { alert('Selecione pelo menos uma peça.'); return; }
                        if (!configData.academia.combinacoes) configData.academia.combinacoes = {};
                        if (!configData.academia.combinacoes[day]) configData.academia.combinacoes[day] = [];
                        configData.academia.combinacoes[day].push(comboText);
                        saveConfig().then(() => renderConfig());
                    });
                });

                document.querySelectorAll('[data-action="delete-combo"]').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const day = this.dataset.day;
                        const idx = parseInt(this.dataset.idx);
                        if (configData.academia.combinacoes && configData.academia.combinacoes[day]) {
                            configData.academia.combinacoes[day].splice(idx, 1);
                            if (configData.academia.combinacoes[day].length === 0) {
                                delete configData.academia.combinacoes[day];
                            }
                            saveConfig().then(() => renderConfig());
                        }
                    });
                });
            }

            menuAcademiaBtn.addEventListener('click', function() {
                closeMenu();
                openConfig();
            });

            openDB().then(database => {
                db = database;
                return loadConfig();
            }).catch(() => {
                configData = {
                    academia: {
                        inicio: '2026-06-30',
                        peso: { atual: null, historico: [], meta: null },
                        diasDescanso: [],
                        objetivos: [],
                        roupas: { camisas: [], calcas: [], tenis: [] },
                        combinacoes: {},
                        treinos: []
                    }
                };
            }).finally(() => {
            });

            btn.textContent = '';
        })();
    </script>
</body>
</html>
